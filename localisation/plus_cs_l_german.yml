 # --- События ---
 plus_cs.1.t:0 "[From.GetnameDefCap] schlägt Frieden vor"
 plus_cs.1.d:0 "Der [From.GetAdjective] Anführer, [From.GetLeader], hat uns vorgeschlagen, Friedensverhandlungen mit [From.GetName] aufzunehmen."
 plus_cs.1.a:0 "Wir haben keine andere Wahl"
 plus_cs.1.b:0 "Wir werden niemals kapitulieren!"
 plus_cs.2.t:0 "[From.GetNameDefCap] bittet um Gespräche zur bedingten Kapitulation"
 plus_cs.2.d:0 "[From.GetLeader], der [From.GetAdjective] Anführer, hat [This.GetNameDef] über seine Bereitschaft informiert, Gespräche über die bedingte Kapitulation von [From.GetNameDef] aufzunehmen."
 plus_cs.2.a:0 "Wir müssen den Frieden wiederherstellen"
 plus_cs.2.b:0 "Wir akzeptieren nur eine bedingungslose Kapitulation!"
 plus_cs.3.t:0 "Einfacher Kapitulationsmodus"
 plus_cs.3.d:0 "Wenn Sie diesen Modus aktivieren, werden feindliche Länder eher bereit sein, Friedensgespräche mit Ihnen zu führen.\n§RDenken Sie daran§!\nFriedensoptionen finden Sie im Abschnitt 'Entscheidungen'."
 plus_cs.3.a:0 "Aktivieren"
 plus_cs.3.b:0 "Nicht aktivieren"
 plus_cs.4.t:0 "[From.GetNameDefCap] schlägt weißen Frieden vor"
 plus_cs.4.d:0 "Der [From.GetAdjective] Anführer, [From.GetLeader], hat einen weißen Frieden zwischen unseren Ländern vorgeschlagen."
 plus_cs.4.a:0 "Lasst uns diesen sinnlosen Krieg beenden"
 plus_cs.4.b:0 "Wir werden nicht so leicht aufgeben"
 plus_cs.5.t:0 "[From.GetNameDefCap] akzeptiert den Frieden!"
 plus_cs.5.d:0 "Der [From.GetAdjectiveCap] Anführer, [From.GetLeader], hat unserem Friedensangebot zugestimmt. Der Krieg ist vorbei!"
 plus_cs.5.a:0 "Endlich Frieden!"
 plus_cs.6.t:0 "[From.GetNameDefCap] lehnt Friedensgespräche ab"
 plus_cs.6.d:0 "Der [From.GetAdjectiveCap] Anführer, [From.GetLeader], hat eine Gelegenheit vertan, den Krieg früher zu beenden."
 plus_cs.6.a:0 "Wir sind am Ende!"
 plus_cs.7.t:0 "[From.GetNameDefCap] schlägt Waffenstillstand vor"
 plus_cs.7.d:0 "Heute haben [From.GetLeader] und die [From.GetRulingParty] zu einer vorübergehenden Einstellung der Feindseligkeiten aufgerufen."
 plus_cs.7.a:0 "Dies könnte der Weg zum endgültigen Frieden sein"
 plus_cs.8.t:0 "Wachsende Unruhen"
 plus_cs.8.d:0 "Die inneren Unruhen nehmen aufgrund der Krise zu. Die Opposition gewinnt an Stärke und das Land steht am Rande des Chaos."
 plus_cs.8.a:0 "Die Unruhen unterdrücken"
 plus_cs.8.b:0 "Die Eskalation zulassen"
 plus_cs.1.b.tooltip_1:0 "Das Volk ist enttäuscht über unsere Weigerung, Frieden zu schließen, angesichts unserer Schwierigkeiten."
 plus_cs.1.b.tooltip_2:0 "Unsere Weigerung, Frieden zu schließen, während die Nation erschöpft ist, hat zu ernster Unzufriedenheit geführt!"
 plus_cs.2.b.tooltip_1:0 "Das Volk versteht nicht, warum wir den Krieg fortsetzen, wenn der Feind zur Kapitulation bereit war."
 plus_cs.2.b.tooltip_2:0 "Unsere Weigerung, die Kapitulation anzunehmen, während die Nation erschöpft ist, hat zu ernster Unzufriedenheit geführt!"
 plus_cs.4.b.tooltip_1:0 "Einen 'Weißen Frieden' während eines Stillstands an der Front abzulehnen, untergräbt die Moral."

 # --- HINZUGEFÜGTE ÜBERSETZUNGEN ---
 plus_cs.9.t:0 "[From.GetNameDefCap] erlebt schweren Aufstand"
 plus_cs.9.d:0 "Unsere Geheimdienstberichte deuten darauf hin, dass [From.GetNameDef] unter einer schweren inneren Krise leidet. Weit verbreitete Aufstände und Streiks sind ausgebrochen, die die Kriegsindustrie lahmlegen und zu erheblichen Verlusten an Arbeitskräften führen. Dies ist eine einmalige Gelegenheit für uns."
 plus_cs.9.a:0 "Ausgezeichnet."
 plus_cs.1001.t:0 "Ein General ist gefallen"
 plus_cs.1001.d:0 "Die brutalen Kämpfe an der Front haben einen wertvollen Anführer gefordert. General [?plus_cs_killed_leader_id.GetName], bekannt für [?plus_cs_killed_leader_id.GetHisHer] aggressive Taktik, ist im Kampf gefallen, als [?plus_cs_killed_leader_id.GetHeShe] [?plus_cs_killed_leader_id.GetHisHer] Truppen anführte. Dieser Verlust ist ein schwerer Schlag für unsere Kommandostruktur."
 plus_cs.1001.a:0 "Ein tragischer Verlust."
 plus_cs.1002.t:0 "Ein Marschall wurde verwundet"
 plus_cs.1002.d:0 "Uns erreichen schreckliche Nachrichten von der Front. Feldmarschall [?plus_cs_wounded_leader_id.GetName] geriet in ein Artilleriefeuer und wurde schwer verwundet. [?plus_cs_wounded_leader_id.GetHisHer] Zustand ist kritisch, und es ist ungewiss, ob [?plus_cs_wounded_leader_id.GetHeShe] das Kommando wieder übernehmen kann."
 plus_cs.1002.a:0 "Wir müssen für [?plus_cs_wounded_leader_id.GetHisHer] Genesung beten."

 # --- Идеи ---
 war_reparations:0 "Kriegsreparationen"
 war_reparations_desc:0 "Dieses Land zahlt derzeit Kriegsreparationen an [?war_reps_to.GetNameDef]"
 peace_disarmed_nation:0 "Entwaffnete Nation"
 peace_civilian_economy:0 "Zivilwirtschaft"
 ceasefire_economic_tribute:0 "Wirtschaftstribut für Waffenruhe"
 
 # FIX: Neuer Key für Idea
 idea_conditional_surrender:0 "Bedingte Kapitulation (Geist)"
 
 internal_crisis_low:0 "Niedrige interne Krise"
 internal_crisis_medium:0 "Mittlere interne Krise"
 internal_crisis_high:0 "Hohe interne Krise"
 revanchism_spirit:0 "Geist des Revanchismus"
 revanchism_spirit_desc:0 "Der Verlust unserer Kerngebiete hat den Rachedurst in den Herzen unseres Volkes entfacht. Wir werden um jeden Preis zurückfordern, was uns gehört."
 successful_negotiator:0 "Erfolgreicher Verhandlungsführer"
 successful_negotiator_desc:0 "Dieser Anführer hat einen vorteilhaften Frieden gesichert und damit seine Autorität bei den Eliten und im Volk gestärkt."
 humiliated_leader:0 "Gedemütigter Anführer"
 humiliated_leader_desc:0 "Die Annahme schmachvoller Friedensbedingungen (Entwaffnung) hat den Ruf dieses Anführers befleckt. Das Volk nimmt ihn als schwach wahr."

 # --- NEUE MECHANIKEN: Wirtschaft 5.0 (Deutsch) ---
 
 shadow_econ_civilian:0 "Investitionsparadies"
 shadow_econ_civilian_desc:0 "§GFriedensnische:§! Das Geschäft blüht, solange die Waffen schweigen. Bietet massiven Zuwachs an politischer Macht und die Chance auf §Yprivate Investitionen§!.\n\n§RUnwirksam im Krieg.§!"
 
 shadow_econ_early:0 "Technische Vorbereitung"
 shadow_econ_early_desc:0 "§GLogistiknische:§! Der Staat konzentriert sich auf Infrastruktur und Verteidigung. Beste Wahl für den Bau von Bunkern, Radar und Straßen vor dem Krieg."
 
 shadow_econ_partial:0 "Qualitätsproduktion"
 shadow_econ_partial_desc:0 "§GBalance:§! Der goldene Mittelweg. Fabriken arbeiten mit höchster Effizienz und Qualität, ohne das Tempo zu erzwingen."
 
 shadow_econ_war:0 "Kriegsfließband"
 shadow_econ_war_desc:0 "§GQuantität:§! Massenproduktion von Waffen auf Kosten der Qualität (Zuverlässigkeit). \n\n§RWarnung:§! Längerer Einsatz in Friedenszeiten führt zu §YWirtschaftsüberhitzung§!."
 
 shadow_econ_total:0 "Totale Erschöpfung"
 shadow_econ_total_desc:0 "§RVerzweiflung:§! Das Land ist ein einziges Militärlager. Maximale Baugeschwindigkeit auf Kosten der Zerstörung von §YWissenschaft§! und §YStabilität§!."

 # --- Andere Mechaniken ---
 
 manpower_strain_mild:0 "§YArbeitskräftemangel§!"
 manpower_strain_mild_desc:0 "Die Mobilisierung beginnt, die Wirtschaft zu belasten. Maschinen stehen still und Lehrlinge ersetzen qualifizierte Ingenieure."
 manpower_strain_high:0 "§OArbeitsmarktkrise§!"
 manpower_strain_high_desc:0 "Zu viele Männer wurden eingezogen. Fabriken verfehlen ihre Quoten und die Logistik bricht ein."
 manpower_strain_collapse:0 "§RDemographischer Kollaps§!"
 manpower_strain_collapse_desc:0 "Die Wirtschaft ist gelähmt. Es gibt kaum noch arbeitsfähige Männer – alle sind an der Front oder tot."

 desperate_defense_effort:0 "§GVerzweifelte Verteidigung§!"
 desperate_defense_effort_desc:0 "Der Feind steht auf unserem Boden! In dieser Stunde gibt es keinen Unterschied mehr zwischen Soldat und Arbeiter."

 shadow_law_service_penalty:0 "Mobilisierungskosten: Dienst nach Bedarf"
 shadow_law_adults_penalty:0 "Mobilisierungskosten: Alle Erwachsenen dienen"
 shadow_law_scraping_penalty:0 "Mobilisierungskosten: Das letzte Aufgebot"

 # --- Косметические теги ---
 COUNTRY_subject:0 "$OVERLORDADJ$ $NONIDEOLOGY$"
 COUNTRY_subject_DEF:0 "$OVERLORDADJ$ $NONIDEOLOGY$"
 COUNTRY_subject_ADJ:0 "$OVERLORDADJ$ $NONIDEOLOGYADJ$"

 # --- NEU: Ehrenhafte Unterwerfung ---
 offer_honorable_submission:0 "Ehrenhafte Unterwerfung anbieten"
 offer_honorable_submission_desc:0 "Unsere Lage ist kritisch. Wir bieten an, ein Untertan des Feindes zu werden, im Austausch für Schutz."
 
 plus_cs_coalition_name:0 "Koalition der Rettung"

 rapid_autonomy_recovery:0 "Weg zur Unabhängigkeit"
 rapid_autonomy_recovery_desc:0 "Wir wurden zur Unterwerfung gezwungen, aber unser Geist ist nicht gebrochen. Wir bauen unsere Stärke wieder auf."
 fight_for_survival:0 "Kampf ums Überleben"
 fight_for_survival_desc:0 "Sie haben unsere Kapitulation abgelehnt. Sie wollen unsere Vernichtung. Wir müssen bis zum letzten Mann kämpfen."
 intervention_reward:0 "Interventionsmandat"
 intervention_reward_desc:0 "Wir sind eingeschritten, um eine Nation vor der Zerstörung zu retten. Das stärkt unsere innere Stabilität."

 plus_cs.submission.1.t:0 "[From.GetNameDefCap] bietet Unterwerfung an"
 plus_cs.submission.1.d:0 "[From.GetNameDef] weiß, dass sie nicht gewinnen können. Sie bieten an, unsere Marionette zu werden."
 plus_cs.submission.1.a:0 "Unterwerfung akzeptieren (Marionette erstellen)"
 plus_cs.submission.1.b:0 "Keine Gnade! Totale Eroberung!"

 plus_cs.submission.2.t:0 "Bedingungen akzeptiert"
 plus_cs.submission.2.d:0 "Der Feind hat unsere Bedingungen akzeptiert. Wir haben überlebt."
 plus_cs.submission.2.a:0 "Ein bitterer Frieden ist besser als der Ruin."

 plus_cs.submission.3.t:0 "Kapitulation abgelehnt!"
 plus_cs.submission.3.d:0 "Sie haben abgelehnt! Wir müssen um unser Überleben kämpfen!"
 plus_cs.submission.3.a:0 "Mobilmachung! Rettet das Vaterland!"

 plus_cs.submission.4.t:0 "Hilferuf von [From.GetNameDef]"
 plus_cs.submission.4.d:0 "[From.GetNameDef] droht die Vernichtung. Sie flehen um Hilfe."
 plus_cs.submission.4.a:0 "Wir müssen eingreifen!"
 plus_cs.submission.4.b:0 "Das ist nicht unser Kampf."

 # Offizierschaos
 officer_shortage_mild:0 "§YFührungsverwirrung§!"
 officer_shortage_mild_desc:0 "Die rasche Expansion der Armee hat die Qualität unseres Offizierskorps verwässert. Befehle werden verzögert."
 officer_shortage_high:0 "§OFührungskrise§!"
 officer_shortage_high_desc:0 "Es mangelt an kompetenten Führern auf Bataillons- und Regimentsebene. Die Koordination bricht zusammen."
 officer_shortage_collapse:0 "§RZusammenbruch des Generalstabs§!"
 officer_shortage_collapse_desc:0 "Die Befehlskette hat sich faktisch aufgelöst. Panik regiert."

 # --- PP-Entscheidungen: Krisenmanagement ---
 decision_category_crisis_management:0 "Krisenmanagement"
 decree_stop_panic:0 "Dekret: 'Keinen Schritt zurück!'"
 decree_stop_panic_desc:0 "Panik breitet sich nach dem Verlust wichtiger Städte aus. Wir müssen ein hartes Dekret erlassen, um die Ordnung sofort wiederherzustellen."
 decree_internal_stability:0 "Interne Propagandakampagne"
 decree_internal_stability_desc:0 "Der Krieg verursacht Unruhen. Wir brauchen eine massive Propagandaanstrengung, um die Bevölkerung zu beruhigen."

 # --- PP-Entscheidungen: Wirtschaftsimpulse ---
 decision_category_economic_stimulus:0 "Wirtschaftsimpulse"
 stimulus_civilian_sector:0 "Zivilen Sektor subventionieren"
 stimulus_civilian_sector_desc:0 "Politisches Kapital in private Unternehmen investieren, um den zivilen Bau zu beschleunigen. Erfordert §YInvestitionsparadies§!."
 stimulus_state_contract:0 "Staatliche Bauaufträge"
 stimulus_state_contract_desc:0 "Direkte staatliche Intervention zum Ausgleich militärischer und ziviler Bedürfnisse. Erfordert §YTechnische Vorbereitung§! oder §YQualitätsproduktion§!."
 stimulus_mil_industrial_complex:0 "Militär-Industrielle Injektion"
 stimulus_mil_industrial_complex_desc:0 "Künstliche Stützung der Rüstungsindustrie. Teuer, aber notwendig für die totale Kriegsproduktion."

 # --- NEU: Industrielle Trägheit & Inflation ---
 war_inflation_crisis:0 "Kriegsinflationskrise"
 war_inflation_crisis_desc:0 "Der Krieg dauert zu lange. Die Währung ist entwertet und der zivile Bau verlangsamt sich."

 economic_retooling_shock_minor:0 "Leichter Umrüstungsschock"
 economic_retooling_shock_minor_desc:0 "Fabriken passen sich neuen Quoten an. Vorübergehender Rückgang der Effizienz."
 
 economic_retooling_shock_medium:0 "Industrielle Umrüstung"
 economic_retooling_shock_medium_desc:0 "Signifikante Änderungen in Logistik und Produktionslinien. Fabriken arbeiten vorübergehend unterdurchschnittlich."
 
 economic_retooling_shock_major:0 "Industrielle Lähmung"
 economic_retooling_shock_major_desc:0 "Drastische wirtschaftliche Veränderungen haben Chaos verursacht. Maschinen werden ausgetauscht. Die Produktion bricht ein."

 # --- NEU: Schicksal der Marionetten ---
 plus_cs.puppet_fate.t:0 "Der Fall des Lehnsherrn"
 plus_cs.puppet_fate.d:0 "Unsere Regierung hat schockierende Nachrichten erhalten: Unser Lehnsherr hat kapituliert und die Bedingungen von [event_target:new_potential_master.GetNameDef] akzeptiert. Die alte Ordnung ist zusammengebrochen.\n\nDie Sieger fordern, dass wir sofort die Waffen niederlegen und ihre Autorität anerkennen. Die Alternative ist die totale Unabhängigkeit, aber wir bleiben im Krieg mit ihrer mächtigen Kriegsmaschinerie."
 plus_cs.puppet_fate.a:0 "Wir erkennen unseren neuen Meister an (Wirtschaftsboni)"
 plus_cs.puppet_fate.b:0 "Wir werden kämpfen! Für die Unabhängigkeit!"

 # Neue Idee
 high_status_puppet_benefit:0 "Privilegiertes Subjekt"
 high_status_puppet_benefit_desc:0 "Wir haben die neue Ordnung friedlich akzeptiert. Im Austausch für unsere Loyalität investiert unser neuer Lehnsherr in unsere Wirtschaft und garantiert Stabilität."

 # В секцию "Ideen" (или в конец файла)
 panic_retreat_shock:0 "Panikartiger Rückzugsschock"
 panic_retreat_shock_desc:0 "Der Verlust wichtiger Städte hat eine Panikwelle in der Armee ausgelöst. Die Organisation bricht zusammen, Soldaten desertieren. Wir müssen harte Maßnahmen ergreifen!"

 # В секцию "Entscheidungen"
 offer_preventive_submission:0 "Präventive Unterwerfung anbieten"
 offer_preventive_submission_desc:0 "Ein Krieg mit einer Großmacht ist Selbstmord. Wir müssen anbieten, ihr Protektorat zu werden, bevor unsere Städte zerstört werden."

 # --- KORREKTUREN UND ERGÄNZUNGEN (Fixes and Additions) ---
 
 # Fehlende Option im Kapitulations-Event
 plus_cs.submission.1.c:0 "Geforderte Gebiete abtreten (Frieden)"

 # Event 205: Gebietsverlust ohne Krieg
 plus_cs.submission.5.t:0 "Gebietsabtretungen"
 plus_cs.submission.5.d:0 "Um einen umfassenden Krieg zu vermeiden, waren wir gezwungen, unsere Gebiete an den Aggressor zu übergeben. Es ist eine nationale Schande, aber wir haben das Leben unserer Soldaten gerettet."
 plus_cs.submission.5.a:0 "Wir werden das niemals vergessen."

 # Event 300: Das Dilemma der Revolutionäre
 plus_cs.300.t:0 "Das Schicksal der Revolution"
 plus_cs.300.d:0 "Unser Bürgerkrieg ist eskaliert. Die ursprüngliche Regierung befindet sich im Krieg mit einer Großmacht. Wir haben eine Wahl: Schutz bei den Feinden unseres Feindes suchen oder das Chaos nutzen, um die Macht mit Gewalt zu ergreifen."
 plus_cs.300.a:0 "Schutz suchen (Marionette einer Großmacht werden)"
 plus_cs.300.b:0 "Keine Herren! (Allen den Krieg erklären und die Macht ergreifen)"


 # Fehlende Option im Kapitulations-Event
 plus_cs.submission.1.c:0 "Geforderte Gebiete abtreten (Frieden)"

 # Event 205: Gebietsverlust ohne Krieg
 plus_cs.submission.5.t:0 "Gebietsabtretungen"
 plus_cs.submission.5.d:0 "Um einen umfassenden Krieg zu vermeiden, waren wir gezwungen, unsere Gebiete an den Aggressor zu übergeben. Es ist eine nationale Schande, aber wir haben das Leben unserer Soldaten gerettet."
 plus_cs.submission.5.a:0 "Wir werden das niemals vergessen."

 # Event 300: Das Dilemma der Revolutionäre
 plus_cs.300.t:0 "Das Schicksal der Revolution"
 plus_cs.300.d:0 "Unser Bürgerkrieg ist eskaliert. Die ursprüngliche Regierung befindet sich im Krieg mit einer Großmacht. Wir haben eine Wahl: Schutz bei den Feinden unseres Feindes suchen oder das Chaos nutzen, um die Macht mit Gewalt zu ergreifen."
 plus_cs.300.a:0 "Schutz suchen (Marionette einer Großmacht werden)"
 plus_cs.300.b:0 "Keine Herren! (Allen den Krieg erklären und die Macht ergreifen)"

 # Event 305 (Schlüssel 301): Erfolgreicher Putsch
 plus_cs.301.t:0 "Neue Ordnung"
 plus_cs.301.d:0 "Dank ausländischer Unterstützung ist das alte Regime gefallen. Jetzt kontrollieren wir das Land, stehen aber in der Schuld unserer Gönner."
 plus_cs.301.a:0 "Lang lebe unser neues Bündnis!"

 # Beschreibung des Nationalgeistes (Wenn Code id=conditional_surrender verwendet)
 conditional_surrender_desc:0 "Dieses Land hat seine Niederlage unter Bedingungen eingestanden. Es kann keinen Bündnissen beitreten oder Allianzen schmieden, solange die Vertragsbeschränkungen gelten."

 # ==============================================================================
 # NEU: WELTKRIEG- UND ALLIANZMECHANIKEN
 # ==============================================================================

 # --- Benachrichtigung über Separatfrieden ---
 plus_cs.410.t:0 "Separatfrieden an der [From.GetAdjective] Front"
 plus_cs.410.d:0 "[From.GetNameDef] hat einen Separatfrieden mit unserem Feind geschlossen. Dank unserer militärischen Präsenz wurde die Kontrolle über die von uns besetzten Gebiete jedoch aufrechterhalten."
 plus_cs.410.a:0 "Unsere Positionen sind gesichert."
 plus_cs_territory_preserved_tt:0 "§GGebiete unter unserer Kontrolle wurden erhalten!§!"

 # --- Fraktionsführer: Mitglied will austreten ---
 plus_cs.420.t:0 "[From.GetNameDefCap] beantragt Austritt aus der Allianz"
 plus_cs.420.d:0 "Die Regierung von [From.GetNameDef] hat um Erlaubnis gebeten, unsere Allianz zu verlassen, um einen Separatfrieden auszuhandeln. Sie behaupten, ihr Land könne die Lasten des Krieges nicht länger tragen."
 plus_cs.420.a:0 "Wir entlassen sie (Austritt erlauben)"
 plus_cs.420.b:0 "Sie müssen kämpfen! (Ablehnen)"

 # --- Fraktionsmitglied: Austritt erlaubt ---
 plus_cs.421.t:0 "Austrittserlaubnis erteilt"
 plus_cs.421.d:0 "Unser Allianzführer hat unsere Situation verstanden und uns erlaubt, die Allianz zu verlassen. Wir können jetzt einen Separatfrieden aushandeln."
 plus_cs.421.a:0 "Wir sind dankbar für das Verständnis."
 plus_cs_can_now_peace_tt:0 "§GSie können jetzt einen Separatfrieden aushandeln§!"

 # --- Fraktionsmitglied: Austritt verweigert ---
 plus_cs.422.t:0 "Austritt verweigert!"
 plus_cs.422.d:0 "Unser Allianzführer hat unseren Austrittsantrag abgelehnt. Sie verlangen, dass wir trotz der Erschöpfung unseres Landes weiterkämpfen.\n\nWir können ihrer Entscheidung folgen oder gegen den Willen der Allianz einseitig austreten."
 plus_cs.422.a:0 "Folgen und den Krieg fortsetzen"
 plus_cs.422.b:0 "Gegen ihren Willen austreten! (Konsequenzen)"

 # --- Kapitulierter Verbündeter will Frieden ---
 plus_cs.430.t:0 "[From.GetNameDefCap] beantragt Kapitulation"
 plus_cs.430.d:0 "[From.GetNameDef] hat kapituliert und bittet um unsere Erlaubnis zur vollständigen Kapitulation vor dem Feind. Wenn wir es erlauben, verlassen sie unsere Allianz."
 plus_cs.430.a:0 "Separate Kapitulation erlauben"
 plus_cs.430.b:0 "Sie müssen auf einen allgemeinen Frieden warten"

 # --- Separate Kapitulation erlaubt ---
 plus_cs.431.t:0 "Erlaubnis erteilt"
 plus_cs.431.d:0 "Unser Allianzführer hat uns erlaubt, einen separaten Frieden auszuhandeln. Wir verlassen die Allianz."
 plus_cs.431.a:0 "Dies ist der einzige Weg..."

 # --- Kapitulation verweigert ---
 plus_cs.432.t:0 "Kapitulation verweigert"
 plus_cs.432.d:0 "Uns wurde das Recht auf separaten Frieden verweigert. Wir bleiben ein kapituliertes Mitglied der Allianz und müssen den allgemeinen Ausgang des Krieges abwarten."
 plus_cs.432.a:0 "Wir haben keine Wahl..."

 # --- Neue Ideen ---
 forced_continuation_war:0 "Erzwungene Kriegsfortsetzung"
 forced_continuation_war_desc:0 "Unsere Allianz verlangt, dass wir trotz unserer Erschöpfung weiterkämpfen. Die Bevölkerung ist demoralisiert, die Armee ist müde, aber wir dürfen nicht kapitulieren."

 # --- Opinion Modifiers ---
 faction_betrayal:0 "Allianzverrat"
 faction_deserter:0 "Allianzdesertion"
 peace_territory_preserved:0 "Gebietskontrolle erhalten"

 # --- Smart Diplomacy & Crises (Kluge Diplomatie & Krisen) ---
 
 plus_cs_diplomacy.1.t:0 "Souveränitätsfrage"
 plus_cs_diplomacy.1.d:0 "Angesichts der überwältigenden Überlegenheit unseres Nachbarn hält unser Kommando einen Krieg für Selbstmord. Wir haben die Chance, die Nation zu retten, indem wir anbieten, ein Protektorat zu werden."
 plus_cs_diplomacy.1.a:0 "Vasallisierung anbieten"
  
 plus_cs_diplomacy.2.t:0 "Unterwerfungsangebot"
 plus_cs_diplomacy.2.d:0 "[From.GetNameDef] versteht das Unvermeidliche und bietet an, im Austausch für Schutz unser Protektorat zu werden. Dies erlaubt uns, unseren Einfluss ohne einen einzigen Schuss zu erweitern."
 plus_cs_diplomacy.2.a:0 "Ihren Treueeid annehmen"
 plus_cs_diplomacy.2.b:0 "Wir wollen ihr Land, keine Eide! (Annektierung)"
 peaceful_vassalization:0 "Friedliche Vasallisierung"
 diplo_insult:0 "Diplomatische Beleidigung"
  
 plus_cs_diplomacy.10.t:0 "Zusammenbruch des Lehnsherrn"
 plus_cs_diplomacy.10.d:0 "Unser Herr [Overlord.GetName] verliert den Krieg. Das Chaos im Mutterland gibt uns die einmalige Chance, die Unabhängigkeit wiederzuerlangen."
 plus_cs_diplomacy.10.a:0 "Unabhängigkeit erklären!"
 plus_cs_diplomacy.10.b:0 "Wir bleiben bis zum Ende loyal"
  
 plus_cs_diplomacy.20.t:0 "Invasionsbedrohung"
 plus_cs_diplomacy.20.d:0 "Der Feind bereitet eine Invasion vor, und unsere Chancen im Krieg sind gleich null. Wir müssen Zugeständnisse anbieten, um eine Katastrophe zu verhindern."
 plus_cs_diplomacy.20.a:0 "Gebietsabtretungen anbieten"
  
 plus_cs_diplomacy.21.t:0 "Diplomatische Auszahlung"
 plus_cs_diplomacy.21.d:0 "[From.GetNameDef], angesichts der Macht unserer Armee an der Grenze, bietet an, unsere territorialen Forderungen kampflos zu erfüllen, wenn wir zukünftige Nichtangriffe garantieren."
 plus_cs_diplomacy.21.a:0 "Zustimmen (Gebiete erhalten)"
 plus_cs_diplomacy.21.b:0 "Wir nehmen uns alles mit Gewalt!"
  
 # --- Internal Crisis (Interne Krise) ---
 plus_cs_internal.1.t:0 "Ultimatum der Generäle"
 plus_cs_internal.1.d:0 "Die Armee ist ausgeblutet. Die Verluste haben die kritische Marke überschritten. Der Generalstab fordert entweder sofortigen Frieden oder einen Regierungswechsel."
 plus_cs_internal.1.a:0 "Säuberungen durchführen (Ablehnen)"
 plus_cs_internal.1.b:0 "Regierung tritt zurück (Putsch)"
 army_purge_aftershock:0 "Nachwirkungen der Armeesäuberung"
  
 # --- Partisans (Partisanen) ---
 broken_nation_resistance:0 "Gebrochene aber unbesiegte Nation"
 plus_cs_partisan_activity:0 "Partisanenaktivität (Guerilla)"
  
 # --- Crisis Decisions (Krisenentscheidungen) ---
 plus_cs_marshall_law:0 "Kriegsrecht ausrufen"
 plus_cs_marshall_law_desc:0 "Harte Maßnahmen zur Wiederherstellung der Ordnung. Reduziert die Produktivität, verhindert aber den Zusammenbruch des Landes."
 plus_cs_patriotic_propaganda:0 "Propaganda 'Vaterland in Gefahr'"
 plus_cs_patriotic_propaganda_desc:0 "Mobilisierung aller Medienressourcen zur Stärkung der Moral."
 plus_cs_faction_bailout:0 "Wirtschaftshilfe für Verbündete"
 plus_cs_faction_bailout_desc:0 "Ressourcen zur Stabilisierung der Währung unseres Verbündeten bereitstellen."
 plus_cs_bailout_tt:0 "Entfernt §RInflation§! vom Zielland."

 # Peace Acceptance Chance Tooltips
 plus_cs_chance_high_tt:0 "§GHohe Wahrscheinlichkeit der Annahme§!"
 plus_cs_chance_medium_tt:0 "§YMittlere Wahrscheinlichkeit der Annahme§!"
 plus_cs_chance_low_tt:0 "§RGeringe Wahrscheinlichkeit der Annahme§!"

 # Missing Keys (Fehlende Schlüssel)
 plus_cs.20.t:0 "[From.GetNameDefCap] bittet um Friedenserlaubnis"
 plus_cs.20.d:0 "[From.GetNameDef] bittet um unsere Erlaubnis, mit dem Feind über Frieden zu verhandeln. Sie geben an, den Krieg nicht fortsetzen zu können."
 plus_cs.20.a:0 "Verhandlungen erlauben"
 plus_cs.20.b:0 "Verbieten! (Veto)"
 plus_cs.21.t:0 "Erlaubnis erteilt"
 plus_cs.21.d:0 "Unser Fraktionsführer hat zugestimmt, dass wir Frieden verhandeln."
 plus_cs.22.t:0 "Erlaubnis verweigert"
 plus_cs.22.d:0 "Unser Fraktionsführer hat uns verboten, Frieden zu verhandeln. Sie fordern, dass wir weiterkämpfen."
 plus_cs.22.a:0 "Wir müssen gehorchen."
 plus_cs.22.b:0 "Wir verhandeln trotzdem! (Fraktion verlassen)"
 plus_cs.23.t:0 "[From.GetNameDefCap] schlägt Separatfrieden vor"
 plus_cs.23.d:0 "[From.GetNameDef] bietet einen separaten Friedensvertrag an und widersetzt sich seinem Fraktionsführer. Wenn angenommen, verlassen sie die Fraktion."
 plus_cs.23.a:0 "Ablehnen"
 plus_cs.23.b:0 "Separatfrieden annehmen"
 plus_cs_internal.3.t:0 "Weißer Frieden Verhandlung"
 plus_cs_internal.3.d:0 "Die neue Regierung versucht, den Krieg sofort zu beenden."
 plus_cs_internal.3.a:0 "Angebot senden"
 plus_cs_purge_tt:0 "§RDie Säuberung des Oberkommandos reduziert die Armeeorganisation für 90 Tage§!"
 peace_treaty_desc:0 ""
 
 # --- LOGIC EVENTS (Kapitulationsdebatte) ---
 plus_cs_logic.1.t:0 "Kabinettsdebatte über Kapitulation"
 plus_cs_logic.1.d:0 "Das Kabinett ist in Aufruhr. Der Feind steht an unseren Grenzen, und Stimmen in der Regierung fordern ein Ende des Blutvergießens. Die Hardliner bestehen jedoch darauf, dass Kapitulation Verrat ist."
 plus_cs_logic.1.a:0 "Wir kämpfen weiter! (Ablehnen)"
 plus_cs_logic.1.b:0 "Wir müssen verhandeln (Kapitulation)"
 plus_cs_surrender_proceed_tt:0 "§GZu formellen Kapitulationsverhandlungen übergehen§!"
 
 # --- Leader Traits Debug ---
 plus_cs_spirit_fanatic_desc:0 "Dieser Anführer wird niemals kapitulieren, solange die Nation nicht vollständig zerstört ist.\n\n§RKI-Friedensakzeptanz: -100%§!\n§O[Debug]: Verborgener Wille: [?Root.plus_cs_hidden_resolve]§!"
 plus_cs_spirit_defeatist_desc:0 "Dieser Anführer ist pessimistisch und sucht beim ersten Anzeichen von Schwierigkeiten Frieden.\n\n§GKI-Friedensakzeptanz: +100%§!\n§O[Debug]: Verborgener Wille: [?Root.plus_cs_hidden_resolve]§!"
 plus_cs_spirit_resilient_desc:0 "Dieser Anführer ist stur und leistet starken Widerstand gegen Kapitulation.\n\n§YKI-Friedensakzeptanz: Normal§!\n§O[Debug]: Verborgener Wille: [?Root.plus_cs_hidden_resolve]§!"
 plus_cs_diplomacy.20.b:0 "Wir werden uns nicht beugen!"
 
