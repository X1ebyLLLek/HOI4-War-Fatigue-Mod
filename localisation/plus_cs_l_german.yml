  plus_cs_reparation_bonus_tt:0 "§GReparationsbonus:§! [FROM.GetName] ist verzweifelt nach Frieden und bietet §Y[?FROM.plus_cs_reparation_bonus] Politische Macht§! als Reparationen."
  plus_cs_separate_peace_blocker:0 "Geist des Separatfriedens"
  plus_cs_separate_peace_blocker_desc:0 "Dieses Land hat einen separaten Friedensvertrag unterzeichnet. Wir können keinen Fraktionen beitreten oder Verbündete rufen, aber unsere Grenzen sind sicher."
  
  # --- SYNERGY CRISIS ---
  army_cohesion_crisis:0 "§RArmeeauflösung§!"
  army_cohesion_crisis_desc:0 "Katastrophale Verluste und Offiziersmangel haben die Armee zerstört. Einheiten weigern sich anzugreifen, Soldaten desertieren."
  homefront_collapse:0 "§RZusammenbruch der Heimatfront§!"
  homefront_collapse_desc:0 "Inflation und politische Krise haben die Wirtschaft lahmgelegt. Streiks in den Fabriken, Brotschlangen werden zu Unruhen."
  total_exhaustion:0 "§RTotale Erschöpfung§!"
  total_exhaustion_desc:0 "Das Land kann nicht mehr Krieg führen. Armee aufgelöst, Wirtschaft tot, Regierung gelähmt."
  political_paralysis:0 "§RPolitische Lähmung§!"
  political_paralysis_desc:0 "Die Regierung ist handlungsunfähig. Stabilität und Kriegsunterstützung sind unter den kritischen Wert gefallen."
  
  # --- POLITICAL COLLAPSE EVENTS ---
  plus_cs_internal.11.t:0 "Militärputsch"
  plus_cs_internal.11.d:0 "Die Generäle haben die Macht übernommen. Die Armee hat die Regierung gestürzt, um die Nation zu retten."
  plus_cs_internal.11.a:0 "Die Ordnung muss wiederhergestellt werden"
  plus_cs_internal.12.t:0 "Politische Lähmung"
  plus_cs_internal.12.d:0 "Die Regierung hat völlig die Kontrolle verloren. Endlose Debatten, Streiks und Unruhen haben die Nation gelähmt."
  plus_cs_internal.12.a:0 "Wir sind machtlos..."
  plus_cs_internal.13.t:0 "Erzwungene Kapitulation"
  plus_cs_internal.13.d:0 "Die Regierung ist zusammengebrochen. Um die totale Vernichtung zu vermeiden, haben die verbliebenen Behörden beschlossen, sich zu ergeben."
  plus_cs_internal.13.a:0 "Wir haben keine Wahl"
  plus_cs.300.c:0 "Wir stehen allein da."
