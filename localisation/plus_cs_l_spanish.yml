 # --- SYNERGY CRISIS ---
 army_cohesion_crisis:0 "§RDesintegración del Ejército§!"
 army_cohesion_crisis_desc:0 "Bajas catastróficas y escasez de oficiales han destruido el ejército. Las unidades se niegan a atacar, los soldados desertan."
 homefront_collapse:0 "§RColapso del Frente Interior§!"
 homefront_collapse_desc:0 "La inflación y la crisis política han paralizado la economía. Huelgas en las fábricas, las colas del pan se convierten en disturbios."
 total_exhaustion:0 "§RAgotamiento Total§!"
 total_exhaustion_desc:0 "El país ya no puede hacer la guerra. Ejército disuelto, economía muerta, gobierno paralizado."
 political_paralysis:0 "§RParálisis Política§!"
 political_paralysis_desc:0 "El gobierno es incapaz de gobernar. La estabilidad y el apoyo a la guerra han caído por debajo del nivel crítico."

 # --- POLITICAL COLLAPSE EVENTS ---
 plus_cs_internal.11.t:0 "Golpe de Estado Militar"
 plus_cs_internal.11.d:0 "Los generales han tomado el poder. El ejército ha derrocado al gobierno para salvar a la nación."
 plus_cs_internal.11.a:0 "El orden debe ser restaurado"
 plus_cs_internal.12.t:0 "Parálisis Política"
 plus_cs_internal.12.d:0 "El gobierno ha perdido completamente el control. Debates interminables, huelgas y disturbios han paralizado la nación."
 plus_cs_internal.12.a:0 "Somos impotentes..."
 plus_cs_internal.13.t:0 "Capitulación Forzada"
 plus_cs_internal.13.d:0 "El gobierno ha colapsado. Para evitar la aniquilación total, las autoridades restantes han decidido rendirse."
 plus_cs_internal.13.a:0 "No tenemos elección"
 plus_cs.300.c:0 "Estamos solos."
 plus_cs_crisis_management:0 "Gestión de Crisis"
 plus_cs_debug_options:0 "Opciones de depuración"

 plus_cp_demands:0 "Demandas diplomáticas"
 plus_cp_demands_desc:0 "Usa peso diplomático y la amenaza de guerra para exigir concesiones."
 plus_cp_demand_core_states:0 "Exigir territorios nacionales"
 plus_cp_demand_core_states_title:0 "Exigir territorios nacionales"
 PLUS_CP_DEMAND_CORE_STATES_TITLE:0 "Exigir territorios nacionales"
 PLUS_CP_DEMAND_CORE_STATES_ACTION_DESC:0 "Exigir el retorno de nuestros legítimos territorios nacionales actualmente en manos de una potencia extranjera. Si se niegan, significará la guerra."
 plus_cs_demands.1.t:0 "Demanda de territorios nacionales"
 plus_cs_demands.1.d:0 "[event_target:plus_cs_demand_sender.GetNameDef] nos ha enviado un ultimátum formal: devolver inmediatamente sus territorios nacionales o enfrentar una invasión."
 plus_cs_demands.1.a:0 "No tenemos más remedio que ceder."
 plus_cs_demands.1.b:0 "¡Nunca! ¡Prepárense para la guerra!"
 plus_cs_demands.2.t:0 "[event_target:plus_cs_demand_recipient.GetNameDef] cede"
 plus_cs_demands.2.d:0 "Temiendo nuestro poderío militar, se han doblegado a nuestras demandas y han devuelto pacíficamente nuestros territorios."
 plus_cs_demands.2.a:0 "Una victoria sin derramamiento de sangre."
 plus_cs_demands.3.t:0 "[event_target:plus_cs_demand_recipient.GetNameDef] se niega"
 plus_cs_demands.3.d:0 "Han rechazado descaradamente nuestro ultimátum. El tiempo de la diplomacia ha terminado."
 plus_cs_demands.3.a:0 "¡A la guerra!"

 # --- Restricciones de Demanda de Territorios Nacionales ---
 plus_cs_demand_not_core_tt:0 "El objetivo debe controlar al menos uno de nuestros estados nacionales o reclamados."
 plus_cs_demand_not_at_war_tt:0 "Ambas naciones deben estar en paz, sin guerras civiles internas."
 plus_cs_demand_not_faction_tt:0 "El objetivo no puede ser nuestro súbdito, señor supremo o miembro de la facción."
 plus_cs_demand_no_recent_tt:0 "No les hemos enviado una demanda territorial recientemente."
 plus_cs_demand_full_annexation_tt:0 "El objetivo debe tener al menos un estado que §RNO§! sea de nuestro núcleo. (No podemos anexar pacíficamente a todo su país)."

 plus_cs.250.t:0 "Ultimatum from [From.GetNameDefCap]!"
 plus_cs.250.d:0 "[From.GetLeader] has sent an ultimatum: surrender immediately or face total destruction. Our military situation is dire, and [From.GetNameDef] demands we submit to their authority as a puppet state.\\n\\nWe have three options: accept their terms and become a puppet, resist the ultimatum and rally the nation, or counter-propose conditional surrender to preserve some autonomy."
 plus_cs.250.a:0 "We submit... (Become puppet)"
 plus_cs.250.b:0 "NEVER! We will fight to the last! (Rally)"
 plus_cs.250.c:0 "Counter-propose conditional terms"
 plus_cs.250.d:0 "[From.GetLeader] has sent an ultimatum: surrender immediately or face total destruction. Our military situation is dire, and [From.GetNameDef] demands we submit to their authority as a puppet state.\\n\\nWe have three options: accept their terms and become a puppet, resist the ultimatum and rally the nation, or counter-propose conditional surrender to preserve some autonomy."
 plus_cs_internal.14.t:0 "Overlord Annexation"
 plus_cs_internal.14.d:0 "As our internal crisis deepens and the government loses all control, our overlord has decided to step in directly. To maintain order and secure their strategic interests, they are officially annexing our territory into their empire. We are no longer a sovereign nation."
 plus_cs_internal.14.a:0 "Submit to direct rule"
 plus_cs_internal.15.t:0 "Defection to the Enemy"
 plus_cs_internal.15.d:0 "Our nation is collapsing, and our so-called overlord offers no salvation. In a desperate bid for survival, elements within our remaining government have negotiated a sudden defection. We will break ties with our current master and surrender ourselves to the conquering enemy forces, hoping they will treat us better as their new subject."
 plus_cs_internal.15.a:0 "Switch sides to survive"
