 # --- Smart Diplomacy & Crises (スマート外交と危機) ---
 
 plus_cs_diplomacy.1.t:0 "主権問題"
 plus_cs_diplomacy.1.d:0 "隣国の圧倒的な優位に直面し、我々の司令部は戦争を自殺行為とみなしています。保護国となることを申し出ることで、国家を救うチャンスがあります。"
 plus_cs_diplomacy.1.a:0 "従属化の申し出を送る"
 
 plus_cs_diplomacy.2.t:0 "服従の申し出"
 plus_cs_diplomacy.2.d:0 "[From.GetNameDef]は不可避な結末を理解しており、保護と引き換えに我々の保護国となることを申し出ています。これにより、一発も撃たずに影響力を拡大できます。"
 plus_cs_diplomacy.2.a:0 "忠誠の誓いを受け入れる"
 plus_cs_diplomacy.2.b:0 "我々が欲しいのは土地だ、誓いではない！（併合）"
 peaceful_vassalization:0 "平和的従属化"
 diplo_insult:0 "外交的侮辱"
 
 plus_cs_diplomacy.10.t:0 "宗主国の崩壊"
 plus_cs_diplomacy.10.d:0 "我々の主人[Overlord.GetName]は戦争に負けています。本国での混乱は、独立を取り戻すまたとない機会を与えてくれます。"
 plus_cs_diplomacy.10.a:0 "独立を宣言する！"
 plus_cs_diplomacy.10.b:0 "最後まで忠誠を尽くす"
 
 plus_cs_diplomacy.20.t:0 "侵略の脅威"
 plus_cs_diplomacy.20.d:0 "敵は侵略を準備しており、我々の勝機はゼロです。破滅を防ぐために、あらゆる譲歩を申し出なければなりません。"
 plus_cs_diplomacy.20.a:0 "領土的譲歩を申し出る"
 
 plus_cs_diplomacy.21.t:0 "外交的見返り"
 plus_cs_diplomacy.21.d:0 "[From.GetNameDef]は、国境に展開する我々の軍事力を見て、将来の不可侵を保証するならば、戦わずに領土要求に応じると申し出ています。"
 plus_cs_diplomacy.21.a:0 "同意する（領土を受け取る）"
 plus_cs_diplomacy.21.b:0 "武力ですべてを奪い取る！"
 
