 plus_cs_diplomacy.1.t:0 "Sovereignty Question"
 plus_cs_diplomacy.1.d:0 "Facing the overwhelming superiority of our neighbor, our command considers war suicide. We have a chance to save the nation by offering to become a protectorate."
 plus_cs_diplomacy.1.a:0 "Send Vassalization Offer"
 
 plus_cs_diplomacy.2.t:0 "Submission Offer"
 plus_cs_diplomacy.2.d:0 "[From.GetNameDef] understands the inevitable and offers to become our protectorate in exchange for protection. This allows us to expand our influence without firing a shot."
 plus_cs_diplomacy.2.a:0 "Accept their oath of allegiance"
 plus_cs_diplomacy.2.b:0 "We want their land, not oaths! (Annexation)"
