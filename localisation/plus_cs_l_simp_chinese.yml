# 投降事件中缺失的选项
plus_cs.submission.1.c:0 "割让索取领土（和平）"

# 事件 205: 不经战争割让领土
plus_cs.submission.5.t:0 "领土让步"
plus_cs.submission.5.d:0 "为了避免全面战争，我们被迫向侵略者移交领土。这是国家的耻辱，但我们保全了士兵的生命。"
plus_cs.submission.5.a:0 "我们绝不会忘记这一切。"

# 事件 300: 革命者的抉择
plus_cs.300.t:0 "革命的命运"
plus_cs.300.d:0 "我们的内战已经升级。原政府正与一个大国交战。我们面临抉择：寻求我们敌人的敌人的庇护，还是利用混乱武力夺取政权。"
plus_cs.300.a:0 "寻求庇护（成为强权的傀儡）"
plus_cs.300.b:0 "没有主人！（向所有人宣战并夺取政权）"

# 事件 305 (代码使用 301 键值): 政变成功
plus_cs.301.t:0 "新秩序"
plus_cs.301.d:0 "感谢外部支持，旧政权已经倒台。现在我们控制了国家，但我们欠了赞助者的人情。"
plus_cs.301.a:0 "我们的新同盟万岁！"

# 国民精神描述 (对应代码 id=conditional_surrender)
conditional_surrender_desc:0 "该国已有条件地承认战败。在条约限制生效期间，它无法加入或创建阵营。"

