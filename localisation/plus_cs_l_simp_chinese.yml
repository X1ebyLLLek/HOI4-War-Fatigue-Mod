 # --- LOGIC EVENTS (关于投降的内阁辩论) ---
 plus_cs_logic.1.t:0 "关于投降的内阁辩论"
 plus_cs_logic.1.d:0 "内阁一片混乱。敌军压境，政府内部出现了要求停止流血的声音。然而，强硬派坚持认为投降就是叛国。"
 plus_cs_logic.1.a:0 "我们将战斗到底！（拒绝）"
 plus_cs_logic.1.b:0 "我们必须寻求和平条款（投降）"
 plus_cs_surrender_proceed_tt:0 "§G进行正式投降谈判§!"
officer_shortage_mild_desc:0 "军队的迅速扩张稀释了军官团的质量。命令被延误。"
officer_shortage_high:0 "§O军官团危机§!"
officer_shortage_high_desc:0 "我们缺乏胜任的营级和团级指挥官。协调正在崩溃。"
officer_shortage_collapse:0 "§R总参谋部崩溃§!"
officer_shortage_collapse_desc:0 "指挥链实际上已经解体。恐慌统治着司令部。"

# --- 政治点数决策：危机管理 ---
decision_category_crisis_management:0 "危机管理"
decree_stop_panic:0 "法令：“一步也不许后退！”"
decree_stop_panic_desc:0 "关键城市失守后恐慌蔓延。我们必须颁布严厉的法令以立即恢复秩序，即使通过高昂的政治代价也在所不惜。"
decree_internal_stability:0 "国内宣传运动"
decree_internal_stability_desc:0 "战争正在引发动荡。我们需要大规模的宣传工作来安抚民众并降低内部危机等级。"

# --- 政治点数决策：经济刺激 ---
decision_category_economic_stimulus:0 "经济刺激"
stimulus_civilian_sector:0 "补贴民用部门"
stimulus_civilian_sector_desc:0 "向私营企业注入政治资本以加快民用建设速度。需要 §Y投资天堂§! 经济。"
stimulus_state_contract:0 "政府建设合同"
stimulus_state_contract_desc:0 "国家直接干预以平衡军事和民用需求。需要 §Y工程整备§! 或 §Y优质生产§! 经济。"
stimulus_mil_industrial_complex:0 "军工注资"
stimulus_mil_industrial_complex_desc:0 "人为地支撑军火工业。虽然昂贵，但对于全面战争生产是必要的。需要 §Y战时流水线§! 或 §Y全面枯竭§! 经济。"

# --- 新增：工业惯性与通货膨胀 ---
war_inflation_crisis:0 "战时通胀危机"
war_inflation_crisis_desc:0 "战争持续太久了。货币贬值，民用建设放缓。"

economic_retooling_shock_minor:0 "轻微转产冲击"
economic_retooling_shock_minor_desc:0 "工厂正在适应新的配额。生产效率暂时下降。"

economic_retooling_shock_medium:0 "工业重组"
economic_retooling_shock_medium_desc:0 "物流和生产线的重大变化。工厂暂时无法满负荷运转。"

economic_retooling_shock_major:0 "工业瘫痪"
economic_retooling_shock_major_desc:0 "剧烈的经济转型引发了混乱。机器设备正在更换，车间正在重建。生产崩溃。"

# --- 新增：傀儡国的命运 (Судьба марионеток) ---
plus_cs.puppet_fate.t:0 "宗主国的陨落"
plus_cs.puppet_fate.d:0 "我们的政府收到了令人震惊的消息：我们的宗主国已经投降并接受了 [event_target:new_potential_master.GetNameDef] 的条件。旧秩序已经崩溃。\n\n胜利者要求我们立即放下武器并承认他们的权威。另一种选择是完全独立，但要与他们强大的战争机器保持战争状态。"
plus_cs.puppet_fate.a:0 "我们承认新的主人（经济加成）"
plus_cs.puppet_fate.b:0 "我们将战斗！为了独立！"

# 新增：特权附庸 (Новая идея)
high_status_puppet_benefit:0 "特权附庸"
high_status_puppet_benefit_desc:0 "我们和平地接受了新秩序。作为对我们忠诚的交换，我们的新宗主国向我们的经济投资并保证稳定。"
panic_retreat_shock:0 "撤退恐慌冲击"
panic_retreat_shock_desc:0 "关键城市的丧失在军队中引发了一波恐慌。组织度正在急剧下降，士兵们正在逃跑。我们需要采取严厉措施！"
offer_preventive_submission:0 "提议预防性屈服"
offer_preventive_submission_desc:0 "与大国开战无异于自杀。我们必须在我们的城市被摧毁之前提议成为他们的保护国。"

