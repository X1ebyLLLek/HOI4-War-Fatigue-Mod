 # --- CUSTOM TOOLTIPS ---
 plus_cs_spirit_fanatic_tt:0 "Obrona armii na terytorium narodowym: §G+10.0%§!\nOrganizacja dywizji: §G+10.0%§!\n\nTen przywódca nigdy się nie podda, dopóki kraj nie zostanie zniszczony.\n\n§RAcceptacja Pokoju AI: -100%§!\n§O[Debug]: Ukryta Wola: [?Root.plus_cs_hidden_resolve]§!"
 plus_cs_spirit_defeatist_tt:0 "Tempo regeneracji dywizji: §R-10.0%§!\nPróg kapitulacji: §R+10.0%§!\n\nTen przywódca jest pesymistą i będzie szukał pokoju przy pierwszych problemach.\n\n§GAcceptacja Pokoju AI: +100%§!\n§O[Debug]: Ukryta Wola: [?Root.plus_cs_hidden_resolve]§!"
