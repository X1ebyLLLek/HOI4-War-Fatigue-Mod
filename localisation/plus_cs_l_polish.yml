 # --- Smart Diplomacy & Crises (Inteligentna Dyplomacja i Kryzysy) ---
 
 plus_cs_diplomacy.1.t:0 "Kwestia Suwerenności"
 plus_cs_diplomacy.1.d:0 "W obliczu miażdżącej przewagi naszego sąsiada, nasze dowództwo uważa wojnę za samobójstwo. Mamy szansę ocalić naród, oferując zostanie protektoratem."
 plus_cs_diplomacy.1.a:0 "Wyślij ofertę wasalizacji"
 
 plus_cs_diplomacy.2.t:0 "Oferta Poddania się"
 plus_cs_diplomacy.2.d:0 "[From.GetNameDef] rozumie nieuchronność i oferuje, że stanie się naszym protektoratem w zamian za ochronę. Pozwala to nam rozszerzyć wpływy bez jednego wystrzału."
 plus_cs_diplomacy.2.a:0 "Przyjmij ich przysięgę wierności"
 plus_cs_diplomacy.2.b:0 "Chcemy ich ziemi, nie przysiąg! (Aneksja)"
 peaceful_vassalization:0 "Pokojowa wasalizacja"
 diplo_insult:0 "Dyplomatyczna zniewaga"
 
 plus_cs_diplomacy.10.t:0 "Upadek Seniora"
 plus_cs_diplomacy.10.d:0 "Nasz pan [Overlord.GetName] przegrywa wojnę. Chaos w metropolii daje nam unikalną szansę na odzyskanie niepodległości."
 plus_cs_diplomacy.10.a:0 "Ogłoś niepodległość!"
 plus_cs_diplomacy.10.b:0 "Pozostaniemy lojalni do końca"
 
 plus_cs_diplomacy.20.t:0 "Groźba Inwazji"
 plus_cs_diplomacy.20.d:0 "Wróg przygotowuje inwazję, a nasze szanse w wojnie są zerowe. Musimy zaoferować wszelkie ustępstwa, aby zapobiec katastrofie."
 plus_cs_diplomacy.20.a:0 "Zaoferuj ustępstwa terytorialne"
 
 plus_cs_diplomacy.21.t:0 "Dyplomatyczna Zapłata"
 plus_cs_diplomacy.21.d:0 "[From.GetNameDef], widząc potęgę naszej armii na granicy, oferuje spełnienie naszych żądań terytorialnych bez walki, jeśli zagwarantujemy nieagresję w przyszłości."
 plus_cs_diplomacy.21.a:0 "Zgódź się (Otrzymasz terytoria)"
 plus_cs_diplomacy.21.b:0 "Weźmiemy wszystko siłą!"
 
 # --- Internal Crisis ---
 plus_cs_internal.1.t:0 "Ultimatum Generałów"
 plus_cs_internal.1.d:0 "Armia jest wykrwawiona. Straty przekroczyły punkt krytyczny. Sztab Generalny żąda natychmiastowego pokoju lub zmiany rządu."
 plus_cs_internal.1.a:0 "Przeprowadź czystki (Odmów)"
 plus_cs_internal.1.b:0 "Rząd podaje się do dymisji (Pucz)"
 army_purge_aftershock:0 "Następstwa czystek w armii"
 
