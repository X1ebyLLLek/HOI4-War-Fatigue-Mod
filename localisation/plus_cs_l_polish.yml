 # Missing Keys (Brakujące klucze)
 plus_cs.20.t:0 "[From.GetNameDefCap] Prosi o zgodę na pokój"
 plus_cs.20.d:0 "[From.GetNameDef] prosi nas o zgodę na negocjacje pokojowe z wrogiem. Twierdzą, że nie są w stanie kontynuować wojny."
 plus_cs.20.a:0 "Zezwól na negocjacje"
 plus_cs.20.b:0 "Zabroń! (Weto)"
 plus_cs.21.t:0 "Zgoda udzielona"
 plus_cs.21.d:0 "Lider naszej frakcji zgodził się, abyśmy negocjowali pokój."
 plus_cs.22.t:0 "Zgoda odmówiona"
 plus_cs.22.d:0 "Lider naszej frakcji zabronił nam negocjować pokój. Żądają, abyśmy walczyli dalej."
 plus_cs.22.a:0 "Musimy być posłuszni."
 plus_cs.22.b:0 "I tak będziemy negocjować! (Opuść frakcję)"
 plus_cs.23.t:0 "[From.GetNameDefCap] Proponuje odrębny pokój"
 plus_cs.23.d:0 "[From.GetNameDef] oferuje odrębną umowę pokojową, sprzeciwiając się liderowi frakcji. Jeśli zostanie zaakceptowana, opuszczą frakcję."
 plus_cs.23.a:0 "Odmów"
 plus_cs.23.b:0 "Zaakceptuj odrębny pokój"
