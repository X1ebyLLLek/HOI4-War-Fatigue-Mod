  plus_cs_reparation_bonus_tt:0 "§GPremia za Reparacje:§! [FROM.GetName] desperacko pragnie pokoju i oferuje §Y[?FROM.plus_cs_reparation_bonus] Siły Politycznej§! w ramach reparacji."
  plus_cs_separate_peace_blocker:0 "Duch Osobnego Pokoju"
  plus_cs_separate_peace_blocker_desc:0 "Ten kraj podpisał osobny traktat pokojowy. Nie możemy dołączać do frakcji ani wzywać sojuszników, ale nasze granice są bezpieczne."
  
  # --- SYNERGY CRISIS ---
  army_cohesion_crisis:0 "§RRozpad Armii§!"
  army_cohesion_crisis_desc:0 "Katastrofalne straty i brak oficerów zniszczyły armię. Jednostki odmawiają ataku, żołnierze masowo dezerterują."
  homefront_collapse:0 "§RZapaść Frontu Domowego§!"
  homefront_collapse_desc:0 "Inflacja i kryzys polityczny sparaliżowały gospodarkę. Strajki w fabrykach, kolejki po chleb zamieniają się w zamieszki."
  total_exhaustion:0 "§RCałkowite Wyczerpanie§!"
  total_exhaustion_desc:0 "Kraj nie może już prowadzić wojny. Armia rozwiązana, gospodarka martwa, rząd sparaliżowany."
  political_paralysis:0 "§RParaliż Polityczny§!"
  political_paralysis_desc:0 "Rząd nie jest w stanie rządzić. Stabilność i poparcie dla wojny spadły poniżej poziomu krytycznego."
  
  # --- POLITICAL COLLAPSE EVENTS ---
  plus_cs_internal.11.t:0 "Przewrót Wojskowy"
  plus_cs_internal.11.d:0 "Generałowie przejęli władzę. Nie mogąc patrzeć na upadek narodu, armia obaliła rząd, by przywrócić porządek."
  plus_cs_internal.11.a:0 "Porządek musi zostać przywrócony"
  plus_cs_internal.12.t:0 "Paraliż Polityczny"
  plus_cs_internal.12.d:0 "Rząd całkowicie stracił kontrolę. Niekończące się debaty, strajki i niepokoje sparaliżowały naród. Nic już nie działa."
  plus_cs_internal.12.a:0 "Jesteśmy bezsilni..."
  plus_cs_internal.13.t:0 "Wymuszona Kapitulacja"
  plus_cs_internal.13.d:0 "Rząd upadł. Aby uniknąć całkowitej zagłady, pozostałe władze zdecydowały się poddać wrogowi."
  plus_cs_internal.13.a:0 "Nie mamy wyboru"
