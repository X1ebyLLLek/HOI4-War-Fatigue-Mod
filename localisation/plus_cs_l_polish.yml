 plus_cs_marshall_law:0 "Wprowadź stan wojenny"
 plus_cs_marshall_law_desc:0 "Surowe środki w celu przywrócenia porządku. Zmniejsza produktywność, ale powstrzymuje kraj przed upadkiem."
 plus_cs_patriotic_propaganda:0 "Propaganda „Ojczyzna w niebezpieczeństwie”"
 plus_cs_patriotic_propaganda_desc:0 "Mobilizacja wszystkich mediów w celu podniesienia morale."
 plus_cs_faction_bailout:0 "Pomoc gospodarcza dla sojusznika"
 plus_cs_faction_bailout_desc:0 "Skieruj zasoby na stabilizację waluty sojusznika."
 plus_cs_bailout_tt:0 "Usuwa §RInflację§! z kraju docelowego."

