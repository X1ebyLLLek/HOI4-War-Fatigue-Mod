 # --- LOGIC EVENTS (Debata o Kapitullacji) ---
 plus_cs_logic.1.t:0 "Rada Gabinetowa: Kapitulacja"
 plus_cs_logic.1.d:0 "W rządzie panuje chaos. Wrogowie są u bram, a niektórzy ministrowie błagają o pokój. Jednak 'jastrzębie' twierdzą, że poddanie się to zdrada."
 plus_cs_logic.1.a:0 "Walczymy dalej! (Odmowa)"
 plus_cs_logic.1.b:0 "Musimy prosić o pokój (Kapitulacja)"
 plus_cs_surrender_proceed_tt:0 "§GPrzejdź do oficjalnych negocjacji§!"
 
