 # --- NEW MECHANICS: Shadow Economy 5.0 ---
 
 shadow_econ_civilian:0 "Investment Haven"
 shadow_econ_civilian_desc:0 "§GPeace Niche:§! Business booms while guns are silent. Provides massive Political Power and chance for §YPrivate Investments§!.\n\n§RIneffective at war.§!"
 
 shadow_econ_early:0 "Engineering Prep"
 shadow_econ_early_desc:0 "§GLogistics Niche:§! State focuses on infrastructure and defense. Best for building bunkers, radar, and roads before the war."
 
 shadow_econ_partial:0 "Quality Production"
 shadow_econ_partial_desc:0 "§GBalance:§! The sweet spot. Factories operate at peak efficiency and quality, but without forcing mass output."
 
 shadow_econ_war:0 "War Assembly Line"
 shadow_econ_war_desc:0 "§GQuantity:§! Mass production of weapons at the cost of quality (reliability). \n\n§RWarning:§! Extended use in peacetime will cause §YEconomic Overheating§!."
 
 shadow_econ_total:0 "Total Exhaustion"
 shadow_econ_total_desc:0 "§RDesperation:§! The country is a single military camp. Max construction speed at the cost of destroying §YScience§! and §YStability§!."

