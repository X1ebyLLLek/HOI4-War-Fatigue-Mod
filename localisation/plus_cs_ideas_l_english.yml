 shadow_law_service_penalty:0 "Mobilization Cost: Service by Requirement"
 shadow_law_adults_penalty:0 "Mobilization Cost: All Adults Serve"
 shadow_law_scraping_penalty:0 "Mobilization Cost: Scraping the Barrel"

 # --- NEW: Submission Mechanics (Ideas only) ---
 rapid_autonomy_recovery:0 "Path to Independence"
 rapid_autonomy_recovery_desc:0 "We were forced to submit, but we are quietly rebuilding our strength."
 fight_for_survival:0 "Fight for Survival"
 fight_for_survival_desc:0 "They refused our surrender. We must fight to the last man."
 intervention_reward:0 "Intervention Mandate"
 intervention_reward_desc:0 "We stepped in to save a nation. This boosts our stability."

 # Officer Chaos
 officer_shortage_mild:0 "§YCommand Confusion§!"
 officer_shortage_mild_desc:0 "Rapid expansion diluted officer quality. Orders are delayed."
 officer_shortage_high:0 "§OOfficer Corps Crisis§!"
 officer_shortage_high_desc:0 "Lack of competent leaders. Coordination is breaking down."
 officer_shortage_collapse:0 "§RGeneral Staff Collapse§!"
 officer_shortage_collapse_desc:0 "Chain of command disintegrated. Panic rules the HQ."

 # --- NEW: Industrial Inertia & Inflation ---
 war_inflation_crisis:0 "War Inflation Crisis"
 war_inflation_crisis_desc:0 "The war has dragged on too long. Currency is devalued, and civilian construction is slowing down."

 economic_retooling_shock_minor:0 "Minor Retooling Shock"
 economic_retooling_shock_minor_desc:0 "Factories are adapting to new quotas. Temporary dip in production efficiency."
 
 economic_retooling_shock_medium:0 "Industrial Retooling"
 economic_retooling_shock_medium_desc:0 "Significant changes in logistics and production lines. Factories are temporarily underperforming."
 
 economic_retooling_shock_major:0 "Industrial Paralysis"
 economic_retooling_shock_major_desc:0 "Drastic economic shifts have caused chaos. Machinery is being replaced, workshops rebuilt. Production collapses."

 # --- NEW: Puppet Benefit Idea ---
 high_status_puppet_benefit:0 "Privileged Subject"
 high_status_puppet_benefit_desc:0 "We peacefully accepted the new order. In exchange for our loyalty, our new overlord invests in our economy and guarantees stability."

 panic_retreat_shock:0 "Panic Retreat Shock"
 panic_retreat_shock_desc:0 "The loss of key cities has triggered a wave of panic in the army. Organization is plummeting, soldiers are deserting. We need to take harsh measures!"

 # National Spirit Description
 conditional_surrender_desc:0 "This country has admitted defeat on conditions. It cannot join factions or create alliances while treaty restrictions are active."
 
 # --- Leader Traits (Base) ---
 plus_cs_spirit_fanatic:0 "Fanatic"
 plus_cs_spirit_fanatic_desc:0 "This leader will never accept surrender unless the nation is completely destroyed.\n\n§RAI Peace Acceptance: -100%§!\n§O[Debug]: Hidden Resolve: [?Root.plus_cs_hidden_resolve]§!"
 plus_cs_spirit_defeatist:0 "Defeatist"
 plus_cs_spirit_defeatist_desc:0 "This leader is pessimistic about the war and will seek peace at the first sign of trouble.\n\n§GAI Peace Acceptance: +100%§!\n§O[Debug]: Hidden Resolve: [?Root.plus_cs_hidden_resolve]§!"
 plus_cs_spirit_resilient:0 "Resilient"
 plus_cs_spirit_resilient_desc:0 "This leader is stubborn and provides strong resistance against surrender.\n\n§YAI Peace Acceptance: Normal§!\n§O[Debug]: Hidden Resolve: [?Root.plus_cs_hidden_resolve]§!"

