 # --- События ---
 plus_cs.1.t:0 "[From.GetnameDefCap] предлагает мир"
 plus_cs.1.d:0 "[From.GetAdjective] лидер, [From.GetLeader], предложил нам вступить в мирные переговоры с [From.GetName]."
 plus_cs.1.a:0 "У нас нет другого выбора"
 plus_cs.1.b:0 "Мы никогда не сдадимся!"
 plus_cs.2.t:0 "[From.GetNameDefCap] просит о переговорах по условной капитуляции"
 plus_cs.2.d:0 "[From.GetLeader], [From.GetAdjective] лидер, известил [This.GetNameDef] о своей готовности начать переговоры об условной капитуляции [From.GetNameDef]."
 plus_cs.2.a:0 "Мы должны восстановить мир"
 plus_cs.2.b:0 "Мы примем только безоговорочную капитуляцию!"
 plus_cs.3.t:0 "Упрощенный режим капитуляции"
 plus_cs.3.d:0 "Если вы активируете этот режим, вражеские страны с большей вероятностью вступят в мирные переговоры с вами.\n§RПомните§!\nМирные опции находятся в разделе «Решения»."
 plus_cs.3.a:0 "Активировать"
 plus_cs.3.b:0 "Не активировать"
 plus_cs.4.t:0 "[From.GetNameDefCap] предлагает белый мир"
 plus_cs.4.d:0 "[From.GetAdjective] лидер, [From.GetLeader], предложил заключить белый мир между нашими странами."
 plus_cs.4.a:0 "Давайте прекратим эту бесполезную войну"
 plus_cs.4.b:0 "Мы так просто не сдадимся"
 plus_cs.5.t:0 "[From.GetNameDefCap] принимает мир!"
 plus_cs.5.d:0 "[From.GetAdjectiveCap] лидер, [From.GetLeader], согласился на наше мирное предложение. Война окончена!"
 plus_cs.5.a:0 "Наконец-то мир!"
 plus_cs.6.t:0 "[From.GetNameDefCap] отказывается от мирных переговоров"
 plus_cs.6.d:0 "[From.GetAdjectiveCap] лидер, [From.GetLeader], упустил возможность закончить войну раньше."
 plus_cs.6.a:0 "Мы влипли!"
 plus_cs.7.t:0 "[From.GetNameDefCap] предлагает прекращение огня"
 plus_cs.7.d:0 "Сегодня [From.GetLeader] и [From.GetRulingParty] призвали к временному прекращению боевых действий."
 plus_cs.7.a:0 "Это может быть путем к окончательному миру"
 plus_cs.8.t:0 "Нарастающие беспорядки"
 plus_cs.8.d:0 "Внутренние волнения усиливаются из-за кризиса. Оппозиция набирает силу, и страна на грани хаоса."
 plus_cs.8.a:0 "Подавить бунт"
 plus_cs.8.b:0 "Дать разгореться"
 plus_cs.1.b.tooltip_1:0 "Народ разочарован нашим отказом от мира, учитывая наши трудности."
 plus_cs.1.b.tooltip_2:0 "Наш отказ от мира на фоне истощения страны вызвал серьезное недовольство!"
 plus_cs.2.b.tooltip_1:0 "Народ не понимает, зачем продолжать войну, если враг был готов сдаться."
 plus_cs.2.b.tooltip_2:0 "Наш отказ принять капитуляцию на фоне истощения страны вызвал серьезное недовольство!"
 plus_cs.4.b.tooltip_1:0 "Отказ от 'Белого мира' во время тупика на фронте подрывает боевой дух."
 plus_cs_reparation_bonus_tt:0 "§GБонус Репараций:§! [FROM.GetName] отчаянно хочет мира и предлагает §Y[?FROM.plus_cs_reparation_bonus] Политической Власти§! в качестве репараций."

 # --- ДОБАВЛЕННЫЕ ПЕРЕВОДЫ ---
 plus_cs.9.t:0 "В [From.GetNameDefCap] крупное восстание"
 plus_cs.9.d:0 "По данным нашей разведки, в [From.GetNameDef] начался серьезный внутренний кризис. Повсеместные бунты и забастовки парализовали военную промышленность и привели к значительным потерям в живой силе. Это прекрасная возможность для нас."
 plus_cs.9.a:0 "Отлично."
 plus_cs.1001.t:0 "Убит генерал"
 plus_cs.1001.d:0 "Жестокие бои на передовой унесли жизнь ценного командира. Генерал [?plus_cs_killed_leader_id.GetName], известный [?plus_cs_killed_leader_id.GetHisHer] агрессивной тактикой, был убит в бою, ведя [?plus_cs_killed_leader_id.GetHisHer] войска. Эта потеря — тяжелый удар по нашей структуре командования."
 plus_cs.1001.a:0 "Трагическая потеря."
 plus_cs.1002.t:0 "Ранен маршал"
 plus_cs.1002.d:0 "Мы получили ужасные вести с фронта. Фельдмаршал [?plus_cs_wounded_leader_id.GetName] попал под артиллерийский обстрел и был тяжело ранен. [?plus_cs_wounded_leader_id.GetHisHer] состояние критическое, и неизвестно, сможет ли [?plus_cs_wounded_leader_id.GetHeShe] вернуться к командованию."
 plus_cs.1002.a:0 "Мы должны молиться о [?plus_cs_wounded_leader_id.GetHisHer] выздоровлении."

 # --- Идеи ---
 war_reparations:0 "Военные репарации"
 war_reparations_desc:0 "Эта страна в настоящее время выплачивает военные репарации [?war_reps_to.GetNameDef]"
 peace_disarmed_nation:0 "Разоружённая нация"
 peace_civilian_economy:0 "Мирная экономика"
 peace_economic_tribute:0 "Экономическая дань за перемирие"
 ceasefire_economic_tribute:0 "Экономическая дань за перемирие"

 # ИСПРАВЛЕНИЕ: Новый уникальный ключ для Нацдуха (чтобы не было дубликата с Решением)
 idea_conditional_surrender:0 "Условная капитуляция (Дух)"

 internal_crisis_low:0 "Низкий внутренний кризис"
 internal_crisis_medium:0 "Средний внутренний кризис"
 internal_crisis_high:0 "Высокий внутренний кризис"
 revanchism_spirit:0 "Дух реваншизма"
 revanchism_spirit_desc:0 "Потеря наших национальных территорий разожгла в сердцах людей жажду мести. Мы вернем своё любой ценой."
 successful_negotiator:0 "Успешный переговорщик"
 successful_negotiator_desc:0 "Этот лидер добился выгодного мира, укрепив свой авторитет среди элит и народа."
 humiliated_leader:0 "Униженный лидер"
 humiliated_leader_desc:0 "Согласие на позорные условия мира легло пятном на репутацию этого лидера. Народ считает его слабым."

 # --- НОВЫЕ МЕХАНИКИ: Экономика 5.0 (Shadow Economy) ---

 shadow_econ_civilian:0 "Инвестиционный рай"
 shadow_econ_civilian_desc:0 "§GМирная ниша:§! Пока пушки молчат, бизнес процветает. Дает огромный приток политической власти и возможность §Yчастных инвестиций§! в промышленность.\n\n§RНеэффективна в войну.§!"

 shadow_econ_early:0 "Инженерная подготовка"
 shadow_econ_early_desc:0 "§GЛогистическая ниша:§! Государство фокусируется на инфраструктуре и обороне. Лучший выбор для строительства бункеров, радаров и дорог перед войной."

 shadow_econ_partial:0 "Качественное производство"
 shadow_econ_partial_desc:0 "§GБаланс:§! Золотая середина между гражданами и военными. Заводы работают с максимальной эффективностью и качеством, но без форсирования темпов."

 shadow_econ_war:0 "Военный конвейер"
 shadow_econ_war_desc:0 "§GКоличество:§! Массовое производство вооружения в ущерб качеству и надежности. \n\n§RВнимание:§! Длительное использование в мирное время приведет к §Yперегреву экономики§!."

 shadow_econ_total:0 "Тотальное истощение"
 shadow_econ_total_desc:0 "§RОтчаяние:§! Страна превращена в единый военный лагерь. Максимальная скорость строительства ценой уничтожения §Yнауки§! и §Yстабильности§!. Используйте только в критической ситуации."

 # --- Другие механики ---

 # Кризис рабочих рук
 manpower_strain_mild:0 "§YНехватка рабочих рук§!"
 manpower_strain_mild_desc:0 "Мобилизация населения начала сказываться на экономике. Станки простаивают, а квалифицированных инженеров заменяют ученики. Производство немного снижено."
 manpower_strain_high:0 "§OКризис на рынке труда§!"
 manpower_strain_high_desc:0 "Слишком много мужчин призвано в армию. Женщины и пенсионеры стараются их заменить, но этого недостаточно. Заводы не успевают выполнять заказы."
 manpower_strain_collapse:0 "§RДемографический коллапс§!"
 manpower_strain_collapse_desc:0 "Экономика парализована. В стране практически не осталось трудоспособных мужчин. Армия на грани самороспуска."

 # Оборона миноров
 desperate_defense_effort:0 "§GОтчаянная оборона§!"
 desperate_defense_effort_desc:0 "Враг топчет нашу родную землю! В этот час нет различий между солдатом и рабочим. Патриотический подъем компенсирует нехватку ресурсов."

 # Штрафы призыва
 shadow_law_service_penalty:0 "Цена мобилизации: Обязательная служба"
 shadow_law_adults_penalty:0 "Цена мобилизации: Всех под ружье"
 shadow_law_scraping_penalty:0 "Цена мобилизации: Скрести по сусекам"

 # --- Косметические теги ---
 COUNTRY_subject:0 "$OVERLORDADJ$ $NONIDEOLOGY$"
 COUNTRY_subject_DEF:0 "$OVERLORDADJ$ $NONIDEOLOGY$"
 COUNTRY_subject_ADJ:0 "$OVERLORDADJ$ $NONIDEOLOGYADJ$"

 # --- НОВОЕ: Цепочка Почетной Сдачи ---
 offer_honorable_submission:0 "Предложить почетную сдачу"
 offer_honorable_submission_desc:0 "Наша ситуация критическая. Дальнейшее сопротивление может привести к полному уничтожению нации. Мы предложим стать субъектом врага в обмен на защиту."

 plus_cs_coalition_name:0 "Коалиция Спасения"

 # Идеи сдачи
 rapid_autonomy_recovery:0 "Путь к независимости"
 rapid_autonomy_recovery_desc:0 "Нас заставили подчиниться, но наш дух не сломлен. Мы тайно восстанавливаем силы."
 fight_for_survival:0 "Борьба за выживание"
 fight_for_survival_desc:0 "Они отвергли нашу капитуляцию. Они хотят нашего полного истребления. У нас нет выбора, кроме как сражаться до последнего."
 intervention_reward:0 "Мандат на вмешательство"
 intervention_reward_desc:0 "Мы вмешались, чтобы спасти нацию от уничтожения. Это укрепляет нашу стабильность."

 # Ивенты сдачи
 plus_cs.submission.1.t:0 "[From.GetNameDefCap] предлагает сдачу"
 plus_cs.submission.1.d:0 "Правительство [From.GetNameDef] понимает, что не может победить. Они предлагают почетную сдачу: стать марионеткой в обмен на жизнь."
 plus_cs.submission.1.a:0 "Принять сдачу (Сделать марионеткой)"
 plus_cs.submission.1.b:0 "Никакой пощады! Полное завоевание!"

 plus_cs.submission.2.t:0 "Условия приняты"
 plus_cs.submission.2.d:0 "Враг принял наши условия. Теперь мы зависимая нация, но мы пережили эту войну."
 plus_cs.submission.2.a:0 "Горький мир лучше, чем гибель."

 plus_cs.submission.3.t:0 "В капитуляции отказано!"
 plus_cs.submission.3.d:0 "Они отвергли наше предложение! Надежды на дипломатию больше нет. Мы должны сражаться за выживание!"
 plus_cs.submission.3.a:0 "Всеобщая мобилизация! Спасти Родину!"

 plus_cs.submission.4.t:0 "Мольба от [From.GetNameDef]"
 plus_cs.submission.4.d:0 "[From.GetNameDef] грозит полное уничтожение. Они умоляют нас о вмешательстве."
 plus_cs.submission.4.a:0 "Мы должны вмешаться! (Вступить в войну)"
 plus_cs.submission.4.b:0 "Это не наша война."

 # Хаос офицеров
 officer_shortage_mild:0 "§YНеразбериха в штабах§!"
 officer_shortage_mild_desc:0 "Быстрое расширение армии размыло качество офицерского состава. Приказы задерживаются."
 officer_shortage_high:0 "§OКризис командования§!"
 officer_shortage_high_desc:0 "Нам не хватает компетентных командиров. Координация нарушена."
 officer_shortage_collapse:0 "§RКоллапс Генштаба§!"
 officer_shortage_collapse_desc:0 "Цепочка командования распалась. В штабах паника. Армия обезглавлена."

 # --- Решения за Полит. Власть: Антикризисное управление ---
 decision_category_crisis_management:0 "Антикризисное управление"
 decree_stop_panic:0 "Приказ: «Ни шагу назад!»"
 decree_stop_panic_desc:0 "Паника распространяется после потери ключевых городов. Мы должны издать суровый указ, чтобы немедленно восстановить порядок, даже ценой высокой политической стоимости."
 decree_internal_stability:0 "Кампания внутренней пропаганды"
 decree_internal_stability_desc:0 "Война вызывает беспорядки. Нам нужны масштабные пропагандистские усилия, чтобы успокоить население и снизить уровень внутреннего кризиса."

 # --- Решения за Полит. Власть: Экономические стимулы ---
 decision_category_economic_stimulus:0 "Экономические стимулы"
 stimulus_civilian_sector:0 "Субсидии гражданскому сектору"
 stimulus_civilian_sector_desc:0 "Вливание политического капитала в частный бизнес для ускорения гражданского строительства. Требует экономики §YИнвестиционный рай§!."
 stimulus_state_contract:0 "Государственный подряд"
 stimulus_state_contract_desc:0 "Прямое государственное вмешательство для баланса военных и гражданских нужд. Требует экономики §YИнженерная подготовка§! или §YКачественное производство§!."
 stimulus_mil_industrial_complex:0 "Накачка ВПК"
 stimulus_mil_industrial_complex_desc:0 "Искусственная поддержка оружейной промышленности. Дорого, но необходимо для тотального производства. Требует экономики §YВоенный конвейер§! или §YТотальное истощение§!."

 # --- НОВОЕ: Промышленная инерция и Инфляция ---
 war_inflation_crisis:0 "Кризис военной инфляции"
 war_inflation_crisis_desc:0 "Война затянулась. Печатный станок перегрет, валюта обесценивается, строительство гражданских объектов замедляется."

 economic_retooling_shock_minor:0 "Малый шок переоборудования"
 economic_retooling_shock_minor_desc:0 "Заводы адаптируются к новым квотам. Временное снижение эффективности производства."

 economic_retooling_shock_medium:0 "Промышленная перестройка"
 economic_retooling_shock_medium_desc:0 "Серьезные изменения в логистике и производственных цепочках. Заводы временно снижают выработку."

 economic_retooling_shock_major:0 "Промышленный паралич"
 economic_retooling_shock_major_desc:0 "Резкая смена экономического курса вызвала хаос. Станки демонтируются, цеха перестраиваются. Производство в упадке."

 # --- НОВОЕ: Судьба Марионеток (Добавить в конец файла) ---
 plus_cs.puppet_fate.t:0 "Падение Сюзерена"
 plus_cs.puppet_fate.d:0 "Наше правительство получило шокирующие новости: наша метрополия капитулировала и приняла условия [event_target:new_potential_master.GetNameDef]. Старый порядок рухнул.\n\nПредставители победителей требуют, чтобы мы немедленно сложили оружие и признали их власть. Альтернатива — полная независимость, но в состоянии войны с их мощной военной машиной."
 plus_cs.puppet_fate.a:0 "Мы признаем нового господина (Бонусы к экономике)"
 plus_cs.puppet_fate.b:0 "Мы будем сражаться! За независимость!"

 # Новая идея
 high_status_puppet_benefit:0 "Привилегированный субъект"
 high_status_puppet_benefit_desc:0 "Мы мирно приняли новый порядок. В обмен на лояльность, наш новый сюзерен инвестирует в нашу экономику и гарантирует стабильность."

 panic_retreat_shock:0 "Паника отступления"
 panic_retreat_shock_desc:0 "Потеря ключевых городов вызвала волну паники в армии. Организация падает, солдаты дезертируют. Нам нужно принять жесткие меры!"

 offer_preventive_submission:0 "Предложить превентивное подчинение"
 offer_preventive_submission_desc:0 "Война с великой державой — это самоубийство. Мы должны предложить стать их протекторатом до того, как наши города будут разрушены."

 # --- ИСПРАВЛЕНИЯ И ДОПОЛНЕНИЯ ---

 # Пропущенная опция в ивенте сдачи
 plus_cs.submission.1.c:0 "Уступить требуемые территории (Мир)"

 # Ивент 205: Потеря территорий без войны
 plus_cs.submission.5.t:0 "Территориальные уступки"
 plus_cs.submission.5.d:0 "Чтобы избежать войны, мы были вынуждены передать наши территории агрессору. Это национальный позор, но мы сохранили жизни солдат."
 plus_cs.submission.5.a:0 "Мы никогда этого не забудем."

 # Ивент 300: Дилемма революционеров
 plus_cs.300.t:0 "Судьба революции"
 plus_cs.300.d:0 "Наша гражданская война переросла в нечто большее. Оригинальное правительство воюет с великой державой. У нас есть выбор: искать поддержки у врагов нашего врага или воспользоваться хаосом, чтобы захватить власть силой."
 plus_cs.300.a:0 "Искать покровительства (Стать марионеткой сильной державы)"
 plus_cs.300.b:0 "Никаких господ! (Объявить войну всем и захватить власть)"

 # Ивент 305 (Ключи 301): Успех переворота
 plus_cs.301.t:0 "Новый порядок"
 plus_cs.301.d:0 "Благодаря внешней поддержке, старый режим пал. Теперь мы контролируем страну, но мы в долгу перед нашими покровителями."
 plus_cs.301.a:0 "Да здравствует наш новый союз!"

 # Исправление для идеи (Если не менять код, то описание для духа нужно такое)
 conditional_surrender_desc:0 "Эта страна признала своё поражение на условных началах. Она не может вступать в альянсы, пока действуют ограничения договора."

 # ==============================================================================
 # НОВОЕ: МЕХАНИКА МИРОВЫХ ВОЙН И АЛЬЯНСОВ
 # ==============================================================================

 # --- Уведомление о сепаратном мире ---
 plus_cs.410.t:0 "Сепаратный мир на [From.GetAdjective] фронте"
 plus_cs.410.d:0 "[From.GetNameDef] заключила сепаратный мир с нашим врагом. Однако благодаря нашему военному присутствию, контроль над занятыми нами территориями сохранен."
 plus_cs.410.a:0 "Наши позиции защищены."
 plus_cs_territory_preserved_tt:0 "§GТерритории под нашим контролем сохранены!§!"

 # --- Лидер альянса: член хочет выйти ---
 plus_cs.420.t:0 "[From.GetNameDefCap] просит о выходе из альянса"
 plus_cs.420.d:0 "Правительство [From.GetNameDef] обратилось к нам с просьбой выйти из нашего альянса для заключения сепаратного мира. Они утверждают, что их страна больше не может выдерживать тяготы войны."
 plus_cs.420.a:0 "Мы отпускаем их (Разрешить выход)"
 plus_cs.420.b:0 "Они должны сражаться! (Отказать)"

 # --- Член альянса: разрешено выйти ---
 plus_cs.421.t:0 "Разрешение на выход получено"
 plus_cs.421.d:0 "Лидер нашего альянса понял нашу ситуацию и разрешил нам выйти из альянса. Теперь мы можем заключить сепаратный мир."
 plus_cs.421.a:0 "Мы благодарны за понимание."
 plus_cs_can_now_peace_tt:0 "§GТеперь можно заключать сепаратный мир§!"

 # --- Член альянса: отказано в выходе ---
 plus_cs.422.t:0 "В выходе отказано!"
 plus_cs.422.d:0 "Лидер нашего альянса отклонил нашу просьбу о выходе. Они требуют, чтобы мы продолжали воевать, несмотря на истощение нашей страны.\n\nМы можем подчиниться их решению или пойти против воли альянса и выйти в одностороннем порядке."
 plus_cs.422.a:0 "Подчиниться и продолжить войну"
 plus_cs.422.b:0 "Выйти вопреки решению! (Будут последствия)"

 # --- Капитулировавший союзник хочет мира ---
 plus_cs.430.t:0 "[From.GetNameDefCap] просит о капитуляции"
 plus_cs.430.d:0 "[From.GetNameDef] капитулировала и просит нашего разрешения на полную сдачу врагу. Если мы разрешим, они покинут наш альянс."
 plus_cs.430.a:0 "Разрешить отдельную капитуляцию"
 plus_cs.430.b:0 "Они должны ждать общего мира"

 # --- Разрешена отдельная капитуляция ---
 plus_cs.431.t:0 "Разрешение получено"
 plus_cs.431.d:0 "Лидер нашего альянса позволил нам заключить отдельный мир. Мы покидаем альянс."
 plus_cs.431.a:0 "Это единственный выход..."

 # --- Отказано в капитуляции ---
 plus_cs.432.t:0 "В капитуляции отказано"
 plus_cs.432.d:0 "Нам отказано в праве на отдельный мир. Мы остаемся капитулировавшим членом альянса и должны ждать общего исхода войны."
 plus_cs.432.a:0 "У нас нет выбора..."

 forced_continuation_war:0 "Принудительное продолжение войны"
 forced_continuation_war_desc:0 "Наш альянс требует, чтобы мы продолжали сражаться, несмотря на истощение страны. Население деморализовано, армия устала, но сдаться нам не позволяют."

 # --- Opinion Modifiers ---
 faction_betrayal:0 "Предательство альянса"
 faction_deserter:0 "Дезертирство из альянса"
 peace_territory_preserved:0 "Сохранение контроля территорий"

 # --- НОВОЕ: Умная Дипломатия и Кризисы (Update 4-5) ---

 plus_cs_diplomacy.1.t:0 "Вопрос Суверенитета"
 plus_cs_diplomacy.1.d:0 "Перед лицом подавляющего превосходства нашего соседа, наше командование считает войну самоубийством. У нас есть шанс сохранить нацию, предложив стать протекторатом."
 plus_cs_diplomacy.1.a:0 "Отправить предложение о вассализации"

 plus_cs_diplomacy.2.t:0 "Предложение о подчинении"
 plus_cs_diplomacy.2.d:0 "[From.GetNameDef] понимает неизбежное и предлагает стать нашим протекторатом в обмен на защиту. Это позволит нам расширить влияние без единого выстрела."
 plus_cs_diplomacy.2.a:0 "Принять их присягу на верность"
 plus_cs_diplomacy.2.b:0 "Нам нужны их земли, а не клятвы! (Аннексия)"
 peaceful_vassalization:0 "Мирная вассализация"
 diplo_insult:0 "Дипломатическое оскорбление"

 plus_cs_diplomacy.10.t:0 "Коллапс Сюзерена"
 plus_cs_diplomacy.10.d:0 "Наш хозяин [Overlord.GetName] проигрывает войну. Хаос в метрополии дает нам уникальный шанс вернуть независимость."
 plus_cs_diplomacy.10.a:0 "Объявить о независимости!"
 plus_cs_diplomacy.10.b:0 "Мы останемся верны до конца"

 plus_cs_diplomacy.20.t:0 "Угроза вторжения"
 plus_cs_diplomacy.20.d:0 "Враг готовит вторжение, и наши шансы в войне равны нулю. Мы должны предложить любые уступки, чтобы предотвратить катастрофу."
 plus_cs_diplomacy.20.a:0 "Предложить территориальные уступки"
 plus_cs_diplomacy.20.b:0 "Мы не склонимся!"

 plus_cs_diplomacy.21.t:0 "Дипломатический откуп"
 plus_cs_diplomacy.21.d:0 "[From.GetNameDef], видя мощь нашей армии на границе, предлагает выполнить наши территориальные требования без боя, если мы гарантируем и ненападение в будущем."
 plus_cs_diplomacy.21.a:0 "Согласиться (Получить территории)"
 plus_cs_diplomacy.21.b:0 "Мы возьмем всё силой!"

 # --- Внутренний кризис ---
 plus_cs_internal.1.t:0 "Ультиматум Генералов"
 plus_cs_internal.1.d:0 "Армия обескровлена. Потери превысили критическую отметку. Генеральный штаб требует либо немедленного мира, либо смены правительства."
 plus_cs_internal.1.a:0 "Провести чистки (Отказ)"
 plus_cs_internal.1.b:0 "Правительство уходит в отставку (Переворот)"
 army_purge_aftershock:0 "Последствия чисток в армии"

 # --- Партизаны ---
 broken_nation_resistance:0 "Сломленная, но непокоренная нация"
 plus_cs_partisan_activity:0 "Партизанская активность (Герилья)"

 # --- Решения Кризиса ---
 plus_cs_marshall_law:0 "Ввести военное положение"
 plus_cs_marshall_law_desc:0 "Жесткие меры по наведению порядка. Снижает производительность, но удерживает страну от распада."
 plus_cs_patriotic_propaganda:0 "Пропаганда 'Родина в опасности'"
 plus_cs_patriotic_propaganda_desc:0 "Мобилизация всех медиа ресурсов для поднятия боевого духа."
 plus_cs_faction_bailout:0 "Экономическая помощь союзнику"
 plus_cs_faction_bailout_desc:0 "Направить ресурсы на стабилизацию валюты нашего союзника."
 plus_cs_bailout_tt:0 "Снимает §RИнфляцию§! у целевой страны."

 # Peace Acceptance Chance Tooltips
 plus_cs_chance_high_tt:0 "§GВысокий шанс принятия§!"
 plus_cs_chance_medium_tt:0 "§YСредний шанс принятия§!"
 plus_cs_chance_low_tt:0 "§RНизкий шанс принятия§!"

 # Missing Keys (English Fallback)
 # --- Перевод ключей (были на английском) ---
 plus_cs.20.t:0 "[From.GetNameDefCap] просит разрешения на мир"
 plus_cs.20.d:0 "[From.GetNameDef] запрашивает наше разрешение на мирные переговоры с врагом. Они заявляют о невозможности продолжать войну."
 plus_cs.20.a:0 "Разрешить переговоры"
 plus_cs.20.b:0 "Запретить! (Вето)"
 plus_cs.21.t:0 "Разрешение получено"
 plus_cs.21.d:0 "Лидер нашей фракции согласился позволить нам вести переговоры о мире."
 plus_cs.22.t:0 "В разрешении отказано"
 plus_cs.22.d:0 "Лидер нашей фракции запретил нам вести переговоры о мире. Они требуют, чтобы мы продолжали сражаться."
 plus_cs.22.a:0 "Мы должны подчиниться."
 plus_cs.22.b:0 "Мы всё равно будем вести переговоры! (Покинуть фракцию)"
 plus_cs.23.t:0 "[From.GetNameDefCap] предлагает сепаратный мир"
 plus_cs.23.d:0 "[From.GetNameDef] предлагает сепаратный мир, игнорируя своего лидера фракции. Если мы согласимся, они покинут фракцию."
 plus_cs.23.a:0 "Отказать"
 plus_cs.23.b:0 "Принять сепаратный мир"
 plus_cs_internal.3.t:0 "Переговоры о белом мире"
 plus_cs_internal.3.d:0 "Новое правительство стремится немедленно прекратить войну."
 plus_cs_internal.3.a:0 "Отправить предложение"
 plus_cs_purge_tt:0 "§RЧистка высшего командования снижает организацию армии на 90 дней§!"
 peace_treaty_desc:0 ""

 # --- Черты Лидера (Traits) ---
 plus_cs_spirit_fanatic:0 "Фанатик"
 plus_cs_spirit_fanatic_desc:0 "Этот лидер никогда не примет капитуляцию, пока нация не будет полностью уничтожена.\n\n§RЖелание мира ИИ: -100%§!\n§O[Debug]: Скрытая Воля: [?Root.plus_cs_hidden_resolve]§!"
 plus_cs_spirit_defeatist:0 "Пораженец"
 plus_cs_spirit_defeatist_desc:0 "Этот лидер пессимистично настроен и будет искать мира при первых проблемах.\n\n§GЖелание мира ИИ: +100%§!\n§O[Debug]: Скрытая Воля: [?Root.plus_cs_hidden_resolve]§!"
 plus_cs_spirit_resilient:0 "Стойкий"
 plus_cs_spirit_resilient_desc:0 "Этот лидер упрям и оказывает сильное сопротивление капитуляции.\n\n§YЖелание мира ИИ: Нормальное§!\n§O[Debug]: Скрытая Воля: [?Root.plus_cs_hidden_resolve]§!"

 # --- CUSTOM TOOLTIPS (Manual Modifiers + Debug) ---
 plus_cs_spirit_fanatic_tt:0 "Оборона на национальной территории: §G+10.0%§!\nОрганизация дивизии: §G+10.0%§!\n\nЭтот лидер никогда не примет капитуляцию, пока нация не будет полностью уничтожена.\n\n§RЖелание мира ИИ: -100%§!\n§O[Debug]: Скрытая Воля: [?Root.plus_cs_hidden_resolve]§!"
 plus_cs_spirit_resilient_tt:0 "Еженедельная стабильность: §G+0.10%§!\n\nЭтот лидер упрям и оказывает сильное сопротивление капитуляции.\n\n§YЖелание мира ИИ: Нормальное§!\n§O[Debug]: Скрытая Воля: [?Root.plus_cs_hidden_resolve]§!"
 plus_cs_spirit_defeatist_tt:0 "Восстановление боевого духа: §R-10.0%§!\nПорог капитуляции: §R+10.0%§!\n\nЭтот лидер пессимистично настроен и будет искать мира при первых проблемах.\n\n§GЖелание мира ИИ: +100%§!\n§O[Debug]: Скрытая Воля: [?Root.plus_cs_hidden_resolve]§!"

 # --- LOGIC EVENTS (Дебаты о сдаче) ---
 plus_cs_logic.1.t:0 "Совет о капитуляции"
 plus_cs_logic.1.d:0 "В кабинете министров хаос. Враг у ворот, и многие требуют прекратить кровопролитие. Однако 'ястребы' настаивают, что сдача — это предательство."
 plus_cs_logic.1.a:0 "Мы продолжим борьбу! (Отказ)"
 plus_cs_logic.1.b:0 "Нужно просить мира (Сдача)"
 plus_cs_surrender_proceed_tt:0 "§GПерейти к формальным переговорам о сдаче§!"

 # --- DEBUG DECISION ---
 plus_cs_debug_vars:0 "DEBUG: Проверить Скрытую Волю"
 plus_cs_debug_vars_desc:0 "§OТекущая Скрытая Воля: [?Root.plus_cs_hidden_resolve]§!\n\nИспользуйте это решение, чтобы записать значение в лог игры."
 plus_cs_debug_dump_all_desc:0 "Записывает значение Скрытой Воли для КАЖДОЙ страны в error.log (game.log)."

 plus_cs_separate_peace_blocker:0 "Дух сепаратного мира"
 plus_cs_separate_peace_blocker_desc:0 "Эта страна подписала сепаратный мирный договор. Мы не можем вступать в фракции или призывать союзников, но наши границы защищены."

 # --- НОВОЕ: Комбинированные кризисы (Synergy Crisis) ---
 army_cohesion_crisis:0 "§RРаспад армии§!"
 army_cohesion_crisis_desc:0 "Катастрофические потери и нехватка офицеров привели к развалу армии. Части отказываются идти в атаку, солдаты массово дезертируют, батальоны сдаются целиком."

 homefront_collapse:0 "§RКрах тыла§!"
 homefront_collapse_desc:0 "Инфляция и политический кризис парализовали экономику. Забастовки охватили заводы, очереди за хлебом перерастают в бунты. Войска нужны для подавления беспорядков."

 total_exhaustion:0 "§RПолное истощение§!"
 total_exhaustion_desc:0 "Страна больше не способна вести войну. Армия разложилась, экономика мертва, правительство парализовано. Любой противник может навязать свои условия."

 political_paralysis:0 "§RПолитический паралич§!"
 political_paralysis_desc:0 "Правительство не способно управлять страной. Стабильность и поддержка войны упали ниже критического уровня. Все решения парализованы."
 # --- POLITICAL COLLAPSE EVENTS ---
 plus_cs_internal.11.t:0 "Военный переворот"
 plus_cs_internal.11.d:0 "Генералы захватили власть. Не в силах наблюдать, как страна рушится, армия свергла правительство. Новая военная хунта стремится восстановить порядок и закончить войну."
 plus_cs_internal.11.a:0 "Порядок должен быть восстановлен"

 plus_cs_internal.12.t:0 "Политический паралич"
 plus_cs_internal.12.d:0 "Кризис углубился настолько, что правительство полностью утратило контроль над страной. Споры о мире и войне переросли во взаимную ненависть, а административный аппарат заморожен. Мы парализованы."
 plus_cs_internal.12.a:0 "Ужасное положение"
 
 plus_cs_internal.13.t:0 "Вынужденная капитуляция"
 plus_cs_internal.13.d:0 "Правительство рухнуло. Чтобы избежать полного уничтожения, оставшиеся власти решили сдаться врагу."
 plus_cs_internal.13.a:0 "У нас нет выбора"
 
 plus_cs_internal.14.t:0 "Прямая аннексия"
 plus_cs_internal.14.d:0 "По мере того как наш внутренний кризис усугубляется и правительство теряет всякий контроль, наш сюзерен решил вмешаться напрямую. Чтобы сохранить порядок и обезопасить свои стратегические интересы, они официально аннексируют нашу территорию. Мы больше не являемся суверенной нацией."
 plus_cs_internal.14.a:0 "Подчиниться прямому правлению"
 
 plus_cs_internal.15.t:0 "Переход на сторону врага"
 plus_cs_internal.15.d:0 "Наша нация рушится, а наш так называемый сюзерен не предлагает никакого спасения. В отчаянной попытке выжить, элементы нашего оставшегося правительства договорились о внезапном переходе на другую сторону. Мы разрываем связи с нашим нынешним хозяином и сдаемся наступающим вражеским силам в надежде, что как новые подданные мы получим лучшее отношение."
 plus_cs_internal.15.a:0 "Сменить сторону ради выживания"
 plus_cs.300.c:0 "Мы одни."
 plus_cs_debug_dump_all:0 "DEBUG: Сбросить волю всех"
 plus_cs_debug_dump_all_desc:0 "Сбросить скрытое значение воли для каждой страны в error.log."
 plus_cs_crisis_management:0 "Антикризисное управление"
 plus_cs_debug_options:0 "Опции отладки"

 plus_cp_demands:0 "Дипломатические требования"
 plus_cp_demands_desc:0 "Используйте дипломатический вес и угрозу войны для выдвижения требований."
 plus_cp_demand_core_states:0 "Потребовать национальные территории"
 plus_cp_demand_core_states_title:0 "Потребовать национальные территории"
 PLUS_CP_DEMAND_CORE_STATES_TITLE:0 "Потребовать национальные территории"
 PLUS_CP_DEMAND_CORE_STATES_ACTION_DESC:0 "Потребовать возвращения наших законных национальных (core) территорий. В случае отказа начнется война."
 plus_cs_demands.1.t:0 "Требование возврата территорий"
 plus_cs_demands.1.d:0 "[event_target:plus_cs_demand_sender.GetNameDef] прислали нам официальный ультиматум: немедленно вернуть их национальные территории или готовиться к полномасштабному вторжению."
 plus_cs_demands.1.a:0 "У нас нет выбора, кроме как уступить."
 plus_cs_demands.1.b:0 "Никогда! Готовьтесь к войне!"
 plus_cs_demands.2.t:0 "[event_target:plus_cs_demand_recipient.GetNameDef] уступает"
 plus_cs_demands.2.d:0 "Опасаясь нашей военной мощи, они подчинились нашим требованиям и мирно вернули наши территории."
 plus_cs_demands.2.a:0 "Бескровная победа."
 plus_cs_demands.3.t:0 "[event_target:plus_cs_demand_recipient.GetNameDef] отказывает"
 plus_cs_demands.3.d:0 "Они нагло отвергли наш ультиматум. Время дипломатии прошло."
 plus_cs_demands.3.a:0 "К войне!"

 # --- НОВОЕ: Ультиматум Победителя ---
 plus_cs.250.t:0 "Ультиматум от [From.GetNameDefCap]!"
 plus_cs.250.d:0 "[From.GetLeader] прислал ультиматум: немедленная капитуляция или полное уничтожение. Наша военная ситуация критическая, и [From.GetNameDef] требует признать их власть.\\n\\nУ нас три варианта: принять условия и стать марионеткой, отвергнуть ультиматум и сплотить нацию, или предложить условную капитуляцию с сохранением автономии."
 plus_cs.250.a:0 "Мы сдаёмся... (Стать марионеткой)"
 plus_cs.250.b:0 "НИКОГДА! Мы будем сражаться до конца! (Сплотиться)"
 plus_cs.250.c:0 "Предложить условную капитуляцию"

 # Ограничения Требования Территорий
 plus_cs_demand_not_core_tt:0 "Цель должна контролировать хотя бы одну из наших Национальных (Core) провинций или претензий (Claim)."
